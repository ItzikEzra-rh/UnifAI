apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-wait-for-services
  namespace: {{ .Values.global.namespace }}
data:
  wait-for-services.sh: |
   
    while [ "$(curl -s -o /dev/null -w "%{http_code}" -u genie:genie123 http://{{ .Release.Name }}-rabbitmq:15672/api/overview)" != "200" ]; do
      echo "Waiting for RabbitMQ service to be ready...";
      sleep 5;
    done;
    echo "RabbitMQ service is up!"
    
    while [ "$(curl -s -o /dev/null -w "%{http_code}" http://{{ .Release.Name }}-mongodb:27017)" != "200" ]; do
      echo "Waiting for MongoDB service to be ready...";
      sleep 5;
    done;
    echo "MongoDB service is up!"

    if [ "$check_vllm" = "check_vllm" ]; then

      while [ "$(curl -s -o /dev/null -w "%{http_code}" http://{{ .Release.Name }}-vllm-reviewer-svc:8000/health)" != "200" ]; do
        echo "Waiting for Vllm-reviewer service to be ready...";
        sleep 20;
      done;
      echo "Vllm-reviewer service is up!"
      
      while [ "$(curl -s -o /dev/null -w "%{http_code}"  http://{{ .Release.Name }}-vllm-orbiter-svc:8000/health)" != "200" ]; do
        echo "Waiting for Vllm-reviewer service to be ready...";
        sleep 20;
      done;
      echo "Vllm-orbiter service is up!"
    fi
