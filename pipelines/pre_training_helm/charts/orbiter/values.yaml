global:
  namespace: 
  orbiter_replica:
  promptlab_env: 

args:
- orbiter
- --celery
- --celery-worker-concurrency
- 8
- --celery-worker-prefetch-count
- 2
#- --reviewer
resources:
  requests:
    memory: "2Gi"     
    cpu: "2"       
  limits:
    memory: "4Gi"     
    cpu: "4" 

image:
  repository: images.paas.redhat.com/genie/prompt_lab
  tag: "latest"
  pullPolicy: Always