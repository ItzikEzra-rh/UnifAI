apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-{{ .Chart.Name }}-reviewer
  namespace: {{ .Values.global.namespace }}
  labels:
    app: {{ .Chart.Name }}-reviewer
spec:
  replicas: {{ .Values.global.vllm_reviewer_replica}}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}-reviewer
  template:
    metadata:
      labels:
        app: {{ .Chart.Name }}-reviewer
    spec:

      {{- if .Values.global.enable_toleration }}
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
        - key: tenant
          operator: Equal
          value: llmaas-a100
          effect: NoSchedule
      {{- end }}
      
      initContainers:
      - name: wait-for-services
        image: images.paas.redhat.com/genie/ubi8:latest
        env:
        - name: RELEASE_NAME
          value: {{.Release.Name | upper}}
        - name: CHART_NAME
          value: {{ .Chart.Name }}
        command: 
        - sh
        - -c
        - /mnt/config/wait-for-services.sh

        volumeMounts:
          - name: {{ .Release.Name }}-wait-for-services
            mountPath: /mnt/config
            readOnly: true

      volumes:
      - name: {{ .Release.Name }}-wait-for-services  
        configMap:
          name: {{ .Release.Name }}-wait-for-services
          defaultMode: 0755

      containers:
      - name: {{ .Chart.Name }}-reviewer
        image: "{{.Values.image.repository}}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        #command: [ "/bin/bash", "-c", "--" ]
        #args: [ "while true; do sleep 3000000; done;" ]
        args: [
              "--model", "{{.Values.global.reviewer_model_hf_id}}",
              {{- range .Values.global.vllm_reviewer_args }}
              '{{ . }}',
              {{- end }}
            ]
        env:
        - name: CUDA_VISIBLE_DEVICES
        {{- if .Values.global.multiple_gpu_per_pod }}
          value: "0,1"
        {{- else }}
          value: "0"
        {{- end }}
        - name: VLLM_ENGINE_USE_TCP
          value: "1"
        - name: NCCL_P2P_DISABLE
          value: "1"  
        - name: TRANSFORMERS_CACHE
          value: "/tmp/.cache"
        - name: HF_HOME
          value: "/tmp/.cache"   
        - name: VLLM_CONFIG_ROOT
          value: "/tmp/.cache"     
        - name: VLLM_CACHE_ROOT
          value: "/tmp/.cache"                    
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              name: "{{.Values.global.hf_token}}"
              key: token

        resources:
          requests:
            memory: {{.Values.resources.requests.memory}} 
            cpu: {{.Values.resources.requests.cpu}}
            nvidia.com/gpu: {{.Values.global.number_of_gpu}}
          limits:
            memory: {{.Values.resources.requests.memory}}
            cpu: {{.Values.resources.requests.cpu}}
            nvidia.com/gpu: {{.Values.global.number_of_gpu}}
          
        ports:
          - containerPort: 8000
        
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 360
          periodSeconds: 20
          timeoutSeconds: 30
          successThreshold: 1
          failureThreshold: 20

        livenessProbe:
          httpGet:
            path: /health
            port: 8000
            scheme: HTTP
          initialDelaySeconds: 360
          periodSeconds: 20
          timeoutSeconds: 30
          successThreshold: 1
          failureThreshold: 20

      {{- if .Values.global.multiple_gpu_per_pod }}
        volumeMounts:
          - name: dshm
            mountPath: /dev/shm

      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: "16Gi"
      {{- end }}


      securityContext:
        seccompProfile:
          type: RuntimeDefault