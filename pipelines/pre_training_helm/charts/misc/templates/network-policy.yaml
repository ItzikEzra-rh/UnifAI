apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-mongodb-np
  namespace: {{ .Values.global.namespace }}
spec:
  podSelector:
    matchLabels:
      app: mongodb

  policyTypes:
    - Ingress
  ingress:
    - ports:
      - port: 27017
        protocol: TCP
    - ports:
      - port: 15672
        protocol: TCP