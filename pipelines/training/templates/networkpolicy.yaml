apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: genie-training-api
spec:
  {{- with .Values.NetworkPolicy.spec.podSelector}}
  podSelector:
    {{- toYaml . | nindent 4}}
  {{- end }}
  policyTypes:
  {{- range .Values.NetworkPolicy.spec.policyTypes }}
    - {{ . }}
  {{- end }}
  {{- with .Values.NetworkPolicy.spec.ingress }}
  ingress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.NetworkPolicy.spec.egress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
