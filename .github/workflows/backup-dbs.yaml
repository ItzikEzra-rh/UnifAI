name: Backup Databases

env:
  PREPROD_API: "https://api.stc-ai-e1-pp.imap.p1.openshiftapps.com:6443"
  PROD_API: "https://api.stc-ai-e1-prod.rtc9.p1.openshiftapps.com:6443"
  MONGO_URI: "mongodb://localhost:27017/unifai"
  NAMESPACE: k8sgpt-operator-system
  MONGO_POD: "mongodb-0"
  username: "tag-ai"
  cluster_name: "nemer"

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:                
    branches: [ "GENIE-1071/backup_dbs" ]

jobs:
  backup_mongo:
    # runs-on: ubuntu-latest
    runs-on: cnv-runner
    steps:

      - name: Check MongoDB Connection
        run: | 
          kubectl config set-credentials $cluster_name --token=${{ secrets.PP_CLUSTER }}
          kubectl config set-cluster $cluster_name --server=$PREPROD_API
          kubectl config set-context $cluster_name --user=$cluster_name --cluster=$cluster_name
          kubectl config use-context $cluster_name
          kubectl get pods --namespace $NAMESPACE
          kubectl get deployments --namespace $NAMESPACE
          #kubectl exec --namespace $NAMESPACE -it $MONGO_POD -- mongo --eval "db.adminCommand('ping')"
      
