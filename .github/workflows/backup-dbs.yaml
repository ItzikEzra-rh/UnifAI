name: Backup Databases

env:

  MONGO_POD: "mongodb-0"
  username: "tag-ai"
  
  #just to invoke workflow
  BRANCH: ${{ inputs.target_branch || 'GENIE-1071/backup_dbs' }}
  CLUSTER: ${{ inputs.target_cluster || 'PRE-PRODUCTION' }}
  NAMESPACE: ${{ inputs.target_namespace || 'tag-ai--pipeline' }}

  #cluster_secret: ${{ secrets.PP_CLUSTER }}
  BACKUP_REPO: ${{ vars.BACKUP_REPO_URL }}
  #BACKUP_REPO: "https://${{ secrets.GITLAB_BACKUP_REPO_KEY }}@gitlab.cee.redhat.com/ai_tools/unifai_backups.git"
  BACKUP_REPO_NAME: ${{ vars.BACKUP_REPO_NAME }}

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Which branch do you want to use?'
        required: true
        default: 'GENIE-1071/backup_dbs'
      target_cluster:
        description: 'Which cluster do you want to backup?'
        required: true
        default: 'PRE-PRODUCTION'
      target_namespace:
        description: 'Which namespace do you want to backup?'
        required: true
        default: 'tag-ai--pipeline'
  #This triggers the workflow automatically anytime someone pushes to the branch - needs to change to when this file is changed
  push:                
    branches: [ 'GENIE-1071/backup_dbs' ]
    paths: [ '.github/workflows/backup-dbs.yaml', '.github/scripts/qdrant_backup.py' ]

jobs:

  verify_agent_deps:
    uses: ./.github/workflows/verify-agent-deps.yaml

  setup_environment:
    runs-on: ubuntu-latest
    needs: verify_agent_deps
    outputs:
      BRANCH: ${{ steps.vars.outputs.branch }}
      CLUSTER: ${{ steps.vars.outputs.cluster }}
      NAMESPACE: ${{ steps.vars.outputs.namespace }}
    steps:
      - id: vars
        run: |
          echo "branch=${{ inputs.target_branch || 'GENIE-1071/backup_dbs' }}" >> $GITHUB_OUTPUT
          echo "cluster=${{ inputs.target_cluster || 'PRE-PRODUCTION' }}" >> $GITHUB_OUTPUT
          echo "namespace=${{ inputs.target_namespace || 'tag-ai--pipeline' }}" >> $GITHUB_OUTPUT



  backup_mongo:
    runs-on: linux
    needs: [setup_environment, verify_agent_deps]
    environment:
      name: ${{ needs.setup_environment.outputs.CLUSTER }}
    env:
      BRANCH: ${{ needs.setup_environment.outputs.BRANCH }}
      CLUSTER: ${{ needs.setup_environment.outputs.CLUSTER }}
      NAMESPACE: ${{ needs.setup_environment.outputs.NAMESPACE }}
    steps:

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.BRANCH }}

      - name: Check Cluster Connection
        run: | 
          echo cluster_secret: ${{ secrets.ACCESS_TOKEN }}
          kubectl config set-credentials ${{ env.CLUSTER }} --token=${{ secrets.ACCESS_TOKEN }}
          kubectl config set-cluster ${{ env.CLUSTER }} --server=${{ vars.API_URL }}
          #here we combine the credentials and the cluster url to create a context, both has the same name.
          kubectl config set-context ${{ env.CLUSTER }} --user=${{ env.CLUSTER }} --cluster=${{ env.CLUSTER }}
          kubectl config use-context ${{ env.CLUSTER }}
          kubectl get pods --namespace ${{ env.NAMESPACE }}
          kubectl get deployments --namespace ${{ env.NAMESPACE }}
      
      - name: Backup MongoDB
        run: |
          echo "Removing old backup files"
          kubectl exec --namespace ${{ env.NAMESPACE }} $MONGO_POD -- rm -rf /tmp/backup
          kubectl exec --namespace ${{ env.NAMESPACE }} $MONGO_POD -- rm -rf /tmp/backup.tar.gz
          echo "Testing mongodump availability and MongoDB connection"
          kubectl exec --namespace ${{ env.NAMESPACE }} $MONGO_POD -- which mongodump || echo "mongodump not found in PATH"
          kubectl exec --namespace ${{ env.NAMESPACE }} $MONGO_POD -- mongosh --eval "db.version()" "${{ vars.MONGO_URI }}" || echo "MongoDB connection test failed"
          echo "Running mongodump with URI: ${{ vars.MONGO_URI }}"
          kubectl exec --namespace ${{ env.NAMESPACE }} $MONGO_POD -- mongodump --uri="${{ vars.MONGO_URI }}" --out="/tmp/backup" 2>&1 || (echo "mongodump failed with exit code $?" && exit 1)
          kubectl exec --namespace ${{ env.NAMESPACE }} $MONGO_POD -- ls -la /tmp/backup 2>/dev/null
          kubectl exec --namespace ${{ env.NAMESPACE }} $MONGO_POD -- tar -czf /tmp/backup.tar.gz /tmp/backup
          kubectl exec --namespace ${{ env.NAMESPACE }} $MONGO_POD -- ls -la /tmp/backup.tar.gz
          kubectl cp --namespace ${{ env.NAMESPACE }} --retries=10 $MONGO_POD:/tmp/backup.tar.gz /tmp/backup.tar.gz
          ls -la /tmp/backup.tar.gz
          echo "Removing temporary files"
          kubectl exec --namespace ${{ env.NAMESPACE }} $MONGO_POD -- rm -rf /tmp/backup
          kubectl exec --namespace ${{ env.NAMESPACE }} $MONGO_POD -- rm -rf /tmp/backup.tar.gz
          echo "Temporary files removed"
          echo "Backup completed"

  backup_qdrant:
    runs-on: linux
    needs: [setup_environment, verify_agent_deps]
    environment:
      name: ${{ needs.setup_environment.outputs.CLUSTER }}
    env:
      BRANCH: ${{ needs.setup_environment.outputs.BRANCH }}
      QDRANT_URL: ${{ vars.QDRANT_URL }}
    steps:

      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.BRANCH }}

      - name: Backup Qdrant
        run: |
          env
          echo "Backing up Qdrant"
          python .github/scripts/qdrant_backup.py
          echo "Qdrant backup completed"

  upload_to_gitlab:        
    runs-on: linux
    needs: [setup_environment, verify_agent_deps, backup_qdrant, backup_mongo]
    steps:

      - name: Upload files to gitlab repo
        run: |

          git clone $BACKUP_REPO
          cp /tmp/backup.tar.gz $BACKUP_REPO_NAME/
          cp -r snapshots $BACKUP_REPO_NAME/

          cd $BACKUP_REPO_NAME
          git config user.email "sfiresht@redhat.com"
          git config user.name "sfiresht"
          git add .
          git commit -m "uploading backup files to gitlab"
          echo "Committed changes"
          git push
        shell: bash        