name: Backup Databases

env:
  PREPROD_API: "https://api.stc-ai-e1-pp.imap.p1.openshiftapps.com:6443"
  PROD_API: "https://api.stc-ai-e1-prod.rtc9.p1.openshiftapps.com:6443"
  MONGO_URI: "mongodb://localhost:27017/unifai"
  NAMESPACE: tag-ai--pipeline
  MONGO_POD: "mongodb-0"
  username: "tag-ai"
  cluster_name: "PP"
  cluster_secret: ${{ secrets.PP_CLUSTER }}

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:                
    branches: [ "GENIE-1071/backup_dbs" ]

jobs:
  backup_mongo:
    # runs-on: ubuntu-latest
    runs-on: linux
    steps:

      - name: Debug Secret Length
        run: |
          if [ -z "$cluster_secret" ]; then
            echo "SECRET IS EMPTY"
          else
            echo "Secret has a length of ${#cluster_secret} characters"
          fi

      - name: Check MongoDB Connection
        run: | 
          echo "cluster_secret: $cluster_secret"
          kubectl config set-credentials $cluster_name --token=$cluster_secret
          kubectl config set-cluster $cluster_name --server=$PREPROD_API
          kubectl config set-context $cluster_name --user=$cluster_name --cluster=$cluster_name
          kubectl config use-context $cluster_name
          kubectl get pods --namespace $NAMESPACE
          kubectl get deployments --namespace $NAMESPACE
          #kubectl exec --namespace $NAMESPACE -it $MONGO_POD -- mongo --eval "db.adminCommand('ping')"
      
      - name: Backup MongoDB
        run: |
          kubectl exec --namespace $NAMESPACE -it $MONGO_POD -- mongodump --uri="mongodb://localhost:27017" --out="/tmp/backup"
          kubectl exec --namespace $NAMESPACE -it $MONGO_POD -- ls -la /tmp/backup
          kubectl exec --namespace $NAMESPACE -it $MONGO_POD -- tar -czvf /tmp/backup.tar.gz /tmp/backup
          kubectl exec --namespace $NAMESPACE -it $MONGO_POD -- ls -la /tmp/backup.tar.gz
          #kubectl cp $MONGO_POD:/tmp/backup.tar.gz /tmp/backup.tar.gz
          #echo "Backup completed"
          #echo "Removing temporary files"
          #rm -rf /tmp/backup
          #rm /tmp/backup.tar.gz
          #echo "Temporary files removed"
          #echo "Backup completed"


