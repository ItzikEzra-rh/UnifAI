name: Backup Databases

env:
  PREPROD_API: "https://api.stc-ai-e1-pp.imap.p1.openshiftapps.com:6443"
  PROD_API: "https://api.stc-ai-e1-prod.rtc9.p1.openshiftapps.com:6443"
  MONGO_URI: "mongodb://localhost:27017/unifai"
  NAMESPACE: tag-ai--pipeline
  MONGO_POD: "mongodb-0"
  username: "tag-ai"
  cluster_name: "PP"
  cluster_secret: ${{ secrets.PP_CLUSTER }}
  BACKUP_REPO: "git@gitlab.cee.redhat.com:ai_tools/unifai_backups.git"
  #BACKUP_REPO: "https://${{ secrets.GITLAB_BACKUP_REPO_KEY }}@gitlab.cee.redhat.com/ai_tools/unifai_backups.git"
  BACKUP_REPO_NAME: "unifai_backups"

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      target_branch:
        description: 'Which branch do you want to use?'
        required: true
        default: 'GENIE-1071/backup_dbs'
      target_cluster:
        description: 'Which cluster do you want to backup?'
        required: true
        default: 'PP'
      target_namespace:
        description: 'Which namespace do you want to backup?'
        required: true
        default: 'tag-ai--pipeline'
  #This triggers the workflow automatically anytime someone pushes to the branch - needs to change to when this file is changed
  push:                
    branches: [ 'GENIE-1071/backup_dbs' ]
    paths: [ '.github/workflows/backup-dbs.yaml', '.github/scripts/qdrant_backup.py' ]

jobs:

  verify_agent_deps:
    uses: ./.github/workflows/verify-agent-deps.yaml

