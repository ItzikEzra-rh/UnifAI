  build_rag:
    name: Build RAG Image
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          
      - name: Build an image from Dockerfile
        run: docker build -t rag-image:${{ github.sha }} -f rag/Dockerfile .

      # - name: Diagnostic - check if image exists in docker
      #   run: docker images | grep rag-image

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'rag-image:${{ github.sha }}'
          scan-type: 'image'    
          exit-code: '0'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'rag-results.sarif'
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2 # Faster/more reliable mirror

      # - name: Check SARIF file existence
      #   run: ls -l rag-results.sarif

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'rag-results.sarif'

  build_multi-agent:
    name: Build Multi-Agent Image
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          
      - name: Build an image from Dockerfile
        run: docker build -t multi-agent-image:${{ github.sha }} -f multi-agent/Dockerfile .

      # - name: Diagnostic - check if image exists in docker
      #   run: docker images | grep multi-agent-image

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'multi-agent-image:${{ github.sha }}'
          scan-type: 'image'          
          exit-code: '0'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'multi-agent-results.sarif'
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2 # Faster/more reliable mirror

      # - name: Check SARIF file existence
      #   run: ls -l multi-agent-results.sarif

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'multi-agent-results.sarif'

  build_sso:
    name: Build SSO Image
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          
      - name: Build an image from Dockerfile
        run: docker build -t sso-image:${{ github.sha }} -f shared-resources/sso-backend/Dockerfile .

      # - name: Diagnostic - check if image exists in docker
      #   run: docker images | grep sso-image

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'sso-image:${{ github.sha }}'
          scan-type: 'image'          
          exit-code: '0'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'sso-results.sarif'
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2 # Faster/more reliable mirror

      # - name: Check SARIF file existence
      #   run: ls -l sso-results.sarif

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'sso-results.sarif'

  build_ui:
    name: Build UI Image
    runs-on: ubuntu-24.04
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          
      - name: Build an image from Dockerfile
        run: docker build -t ui-image:${{ github.sha }} -f ui/deployment/Dockerfile .

      # - name: Diagnostic - check if image exists in docker
      #   run: docker images | grep ui-image

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'ui-image:${{ github.sha }}'
          scan-type: 'image'          
          exit-code: '0'
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
          format: 'sarif'
          output: 'ui-results.sarif'
        env:
          TRIVY_DB_REPOSITORY: public.ecr.aws/aquasecurity/trivy-db:2 # Faster/more reliable mirror

      # - name: Check SARIF file existence
      #   run: ls -l ui-results.sarif

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'ui-results.sarif'

  analyze:
    needs: [build_rag, build_multi-agent, build_sso, build_ui]
    if: always() && contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    steps:

    - name: Generate Token
      id: generate_token
      #uses: tibdex/github-app-token@v2
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ secrets.LOG_ANALYZER_APP_ID }}
        private-key: ${{ secrets.LOG_ANALYZER_PRIVATE_KEY }}

    - name: GitHub Actions Failure Analysis
      uses: calebevans/gha-failure-analysis@v0.1.9
      with:
        llm-provider: gemini
        llm-model: gemini-3-pro-preview
        llm-api-key: ${{ secrets.GEMINI_API_KEY }}
        github-token: ${{ steps.generate_token.outputs.token }}
        post-pr-comment: false