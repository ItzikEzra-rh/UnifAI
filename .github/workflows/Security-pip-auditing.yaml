name: PIP Audit Dependency Security Scan

on: 
    push:
        branches:
            - GENIE-1354-dependency_scanning
    pull_request:
    workflow_dispatch:

jobs:
    scan:
        runs-on: ubuntu-latest
        steps:

        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: '3.11'

        - name: Install pip-audit
          run: pip install pip-audit

        - name: Scan dependencies
          # This will fail the build if a vulnerability is found
          run: pip-audit

    analyze:
        needs: [scan
        if: always() && contains(needs.*.result, 'failure')
        runs-on: ubuntu-latest
        permissions:
            actions: read
            contents: read
        steps:

        - name: Generate Token
          id: generate_token
          #uses: tibdex/github-app-token@v2
          uses: actions/create-github-app-token@v2
          with:
            app-id: ${{ secrets.LOG_ANALYZER_APP_ID }}
            private-key: ${{ secrets.LOG_ANALYZER_PRIVATE_KEY }}

        - name: GitHub Actions Failure Analysis
          uses: calebevans/gha-failure-analysis@v0.1.9
          with:
            llm-provider: gemini
            llm-model: gemini-3-pro-preview
            llm-api-key: ${{ secrets.GEMINI_API_KEY }}
            github-token: ${{ steps.generate_token.outputs.token }}
            post-pr-comment: false