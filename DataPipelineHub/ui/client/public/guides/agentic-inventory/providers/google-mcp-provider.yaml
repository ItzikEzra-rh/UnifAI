guide_title: "Google MCP Provider Setup"
title: "Google MCP Provider Setup"
description: "Complete guide to set up a Google Workspace MCP server for UnifAI"
category: "providers"
section: "agentic-inventory"
order: 1
steps:
  - step: 1
    title: "Extract Credentials from Google Console"
    body: |
      ## Create a Google Cloud Project
      
      1. Go to [Google Cloud Console](https://console.cloud.google.com/)
      2. Create a new project or select an existing one
      
      ## Configure OAuth Consent Screen
      
      1. Navigate to **APIs & Services → OAuth consent screen**
      2. Select **External** and click **Create**
      3. Fill in the required fields (app name, support email, developer email - both your redhat gmail account)
      4. Click **Save and Continue** through the remaining steps
      
      **Important:** When you first try to use the OAuth credentials, you may see a warning message: **"This app isn't verified"** or **"Google hasn't verified this app"**. This is normal for development/testing. To proceed:
      - Click **Advanced** at the bottom of the warning screen
      - Click **Go to [Your App Name] (unsafe)** to continue
      - This allows you to use the app during development
      
      ## Create OAuth Credentials
      
      1. Go to **APIs & Services → Credentials**
      2. Click **Create Credentials → OAuth Client ID**
      3. Select **Web Application**
      4. Configure:
         - **Name**: "UnifAI Google MCP Server" (or any name)
         - **Authorized JavaScript origins**: `http://localhost:8000`
         - **Authorized redirect URIs**: `http://localhost:8000/oauth2callback`
      5. Click **Create** and copy your **Client ID** and **Client Secret**
      
      You'll also need:
      - **Project ID**: Found in the project selector (e.g., `unifai-testing`)
      - **User Email**: Your Google account email address

  - step: 2
    title: "Download & Run the Setup Script"
    body: |
      ## Download the Script
      
      Download: [google_workspace_mcp_script.sh](/guides/agentic-inventory/providers/google_workspace_mcp_script.sh)
      
      ## Prerequisites
      
      Ensure you have **Docker** (or Podman) and **Docker Compose** installed and running. Git is also required.
      
      ## Run the Script
      
      ```bash
      chmod +x google_workspace_mcp_script.sh
      
      cd Downloads  # or wherever you saved the script

      bash ./google_workspace_mcp_script.sh \\
        --client_id "YOUR_CLIENT_ID" \\
        --client_secret "YOUR_CLIENT_SECRET" \\
        --user_email "your-email@example.com" \\
        --project_id "your-project-id" \\
        --enable_services
      ```
      
      The script will automatically clone the repository, configure the environment, enable Google APIs, and start the MCP server. **Note the SSE Endpoint URL** displayed at the end (e.g., `http://192.168.1.100:8000/mcp`).

  - step: 3
    title: "Connect UniFAI to Your Local MCP Server"
    body: |
      ## Configure the SSE Endpoint
      
      1. In UnifAI, go to Agentic Inventory -> Providers -> MCP Provider
      2. Click "Create New" and locate the **SSE Endpoint** field
      2. Enter: `http://YOUR_IP_ADDRESS:8000/mcp`
         - Replace `YOUR_IP_ADDRESS` with the IP shown by the script
         - Example: `http://192.168.1.100:8000/mcp`
      3. Wait for validation, then click **Save**
      
      ## Troubleshooting
      
      - **Connection refused**: Check if Docker container is running (`docker ps`)
      - **Cannot reach server**: Verify IP address and firewall settings
      - **OAuth errors**: Ensure redirect URI matches `http://YOUR_IP:8000/oauth2callback` in Google Console
      
      **Useful commands:**
      - View logs: `docker-compose logs -f`
      - Stop server: `docker-compose down`
      - Restart: `docker-compose restart`
