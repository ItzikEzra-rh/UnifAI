description: |
  Demo blueprint showing branch chooser node feeding into router boolean condition that 
  routes based on configured boolean value: True goes to mock agent 1, False goes to mock agent 2.
  Only mock agent 1 proceeds to finalize.

name: |
  Boolean Router Demo

# ----------------------------
# LLM Definitions (minimal for mock agents)
# ----------------------------
llms: [ ]

# ----------------------------
# Nodes
# ----------------------------
nodes:
  - rid: user_input
    name: user_input
    type: user_question_node
    config:
      type: user_question_node

  - rid: branch_chooser
    name: branch_chooser
    type: branch_chooser_node
    config:
      type: branch_chooser_node
      default_branch: "mock_agent_1_step"

  - rid: mock_agent_1
    name: mock_agent_1
    type: mock_agent_node
    config:
      type: mock_agent_node
      echo_message: "This is Mock Agent 1 responding (Boolean = True)!"

  - rid: mock_agent_2
    name: mock_agent_2
    type: mock_agent_node
    config:
      type: mock_agent_node
      echo_message: "This is Mock Agent 2 responding (Boolean = False)!"

  - rid: final_answer
    name: final_answer
    type: final_answer_node
    config:
      type: final_answer_node

# ----------------------------
# Conditions
# ----------------------------
conditions:
  - rid: boolean_router
    name: boolean_router
    type: router_boolean
    config:
      type: router_boolean
      boolean_value: false  # Change this to false to route to mock_agent_2

# ----------------------------
# Plan Steps
# ----------------------------
plan:
  - uid: user_input
    node: user_input
    meta:
      display_name: User Question
      description: |
        The user inputs a question or request to start the pipeline.

  - uid: branch_chooser
    after: user_input
    node: branch_chooser
    exit_condition: boolean_router
    branches:
      true: mock_agent_1_step
      false: mock_agent_2_step
    meta:
      display_name: Branch Chooser
      description: |
        Uses boolean router condition to decide routing.
        True routes to Mock Agent 1, False routes to Mock Agent 2.

  # Mock Agent 1 instance (goes to finalize)
  - uid: mock_agent_1_step
    node: mock_agent_1
    meta:
      display_name: Mock Agent 1 (True Branch)
      description: |
        Mock agent that handles the True branch case.
        This agent proceeds to the final answer step.

  # Mock Agent 2 instance (terminal - does not go to finalize)
  - uid: mock_agent_2_step
    node: mock_agent_2
    meta:
      display_name: Mock Agent 2 (False Branch)
      description: |
        Mock agent that handles the False branch case.
        This is a terminal step and does not proceed to finalize.

  # Only mock agent 1 goes to final answer
  - uid: final_answer
    after: mock_agent_1_step
    node: final_answer
    meta:
      display_name: Final Answer
      description: |
        Produces the final output only from Mock Agent 1's response.
        Mock Agent 2 is terminal and doesn't reach this step.