# ----------------------------
# Providers
# ----------------------------
providers:
  - name: mcp
    type: mcp_server
    sse_endpoint:  http://127.0.0.1:8006/servers/mcp-atlassian/sse

# ----------------------------
# LLM Definitions
# ----------------------------
llms:
  - name: openai_llm
    type: openai
    model_name: gemini-2.0-flash
    api_key: AIzaSyBwuQtKPtwKILBulq_YW16RKjMAVx4gbKQ
    base_url: https://generativelanguage.googleapis.com/v1beta/openai


# ----------------------------
# Tool Stubs
# ----------------------------
tools:
  - name: jira_get_issue_tool
    type: mcp_proxy
    tool_name: jira_get_issue
    provider: mcp

  - name: jira_search_tool
    type: mcp_proxy
    tool_name: jira_search
    provider: mcp

  - name: jira_get_project_issues_tool
    type: mcp_proxy
    tool_name: jira_get_project_issues
    provider: mcp

  - name: jira_create_issue_tool
    type: mcp_proxy
    tool_name: jira_create_issue
    provider: mcp

  - name: jira_link_to_epic_tool
    type: mcp_proxy
    tool_name: jira_link_to_epic
    provider: mcp

  - name: jira_update_issue_tool
    type: mcp_proxy
    tool_name: jira_update_issue
    provider: mcp
# ----------------------------
# Plan Steps
# ----------------------------
plan:
  - uid: user_input
    node:
      type: user_question_node

  - uid: agent_with_addition_tool_mcp
    after: user_input
    node:
      type: custom_agent_node
      llm: openai_llm
      tools:
        - jira_get_issue_tool
        - jira_search_tool
        - jira_get_project_issues_tool
        - jira_create_issue_tool
        - jira_link_to_epic_tool
        - jira_update_issue_tool
      system_message: |
        You are a smart assistant with access to tools. When a user's request requires multiple steps, and one tool’s output is needed as input to another, do not guess intermediate values.
        Instead, call the first tool, wait for its result, then use the actual result in the next step.
        Only issue tool calls that can be executed immediately based on available information. Respond with content or tool calls as appropriate.

  - uid: finalize
    after: agent_with_addition_tool_mcp
    node:
      type: final_answer_node