description: |
  mcp agent
name: |
  one mcp agent


nodes:
  - rid: user_question_node_rid
    name: User Question Node
    type: user_question_node
    config:
      type: user_question_node

  - rid: final_answer_node_rid
    name: Final Answer None
    type: final_answer_node
    config:
      type: final_answer_node

  - rid: mcp_agent_rid
    name: mcp_agent
    type: custom_agent_node
    config:
      type: custom_agent_node
      llm: $ref:a9968c7061b84532818805b68f66a307
      provider: $ref:b0424eabb34c4bf0ab4cf4bf7d57b055
      system_message: |
        you are a jira expert

  - rid: review_agent_rid
    name: review_agent
    type: custom_agent_node
    config:
      type: custom_agent_node
      llm: $ref:a9968c7061b84532818805b68f66a307
      system_message: |
        return only the names of the issues you get

# ----------------------------
# Plan Steps
# ----------------------------
plan:
  - uid: user_input
    node: user_question_node_rid
    meta:
      display_name: User Question
      description: |
        The user inputs a question or request.

  - uid: mcp_agent
    after: user_input
    node: mcp_agent_rid
    meta:
      display_name: MCP Agent
      description: |
        MCP Agent

  - uid: review_agent
    after: mcp_agent
    node: review_agent_rid
    meta:
      display_name: MCP Agent
      description: |
        MCP Agent

  - uid: finalize
    after: review_agent
    node: final_answer_node_rid
    meta:
      display_name: Final Answer
      description: |
        Provide the final answer to the user based on all gathered information.

