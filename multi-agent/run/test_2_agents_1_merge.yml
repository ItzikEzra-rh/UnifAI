# ----------------------------
# LLM Definitions
# ----------------------------
llms:
  - name: openai_llm
    type: openai
    model_name: Qwen/Qwen2.5-7B-Instruct

# ----------------------------
# Retriever
# ----------------------------
retrievers: [ ]

# ----------------------------
# Tool Stubs
# ----------------------------
tools: [ ]

# ----------------------------
# Conditions
# ----------------------------
conditions: [ ]


# ----------------------------
# Plan Steps
# ----------------------------
plan:
  - name: user_input
    node:
      type: user_question_node

#  - name: agent_1
#    after: user_input
#    node:
#      name: ask_llm_custom_agent_1
#      type: custom_agent_node
#      llm: openai_llm
#      system_message: |
#        just echo to me the name Odai


  - name: agent_2
    after: user_input
    node:
      name: ask_llm_custom_agent_2
      type: custom_agent_node
      llm: openai_llm
      system_message: |
        name is Nir

  - name: agent_3
    after: user_input
    node:
      name: ask_llm_custom_agent_3
      type: custom_agent_node
      llm: openai_llm
      system_message: |
        name is Omri

  - name: agent_merger
    after:
#      - agent_1
      - agent_2
      - agent_3
    node:
      name: agent_merger_node
      type: merger_node
      llm: openai_llm
      system_message: |
        tell me about the all names, what are they, what they stem from, what is common between these names?
  - name: finalize
    after: agent_merger
    node:
      type: final_answer_node