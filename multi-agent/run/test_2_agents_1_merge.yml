# ----------------------------
# LLM Definitions
# ----------------------------
llms:
  - name: openai_llm
    type: openai
    model_name: Qwen/Qwen2.5-7B-Instruct

# ----------------------------
# Retriever
# ----------------------------
retrievers: [ ]

# ----------------------------
# Tool Stubs
# ----------------------------
tools: [ ]

# ----------------------------
# Conditions
# ----------------------------
conditions: [ ]


# ----------------------------
# Plan Steps
# ----------------------------
plan:
  - name: user_input # Output could be used to name the planet or set context in a more advanced version.
    node:
      type: user_question_node

  - name: agent_1 # The Apex Predator Analyst
    after: user_input
    node:
      name: ask_llm_custom_agent_1
      type: custom_agent_node
      llm: openai_llm # Or your preferred LLM
      system_message: |
        just echo to me the name odai


  - name: agent_2 # The Resilient Flora-Fauna Hybrid Designer
    after: user_input
    node:
      name: ask_llm_custom_agent_2
      type: custom_agent_node
      llm: openai_llm # Or your preferred LLM
      system_message: |
        just echo to me the name nir

  - name: agent_3 # The Resilient Flora-Fauna Hybrid Designer
    after: user_input
    node:
      name: ask_llm_custom_agent_3
      type: custom_agent_node
      llm: openai_llm # Or your preferred LLM
      system_message: |
        just echo to me the name omri

  - name: agent_merger # The Symbiosis Architect
    after:
      - agent_1
      - agent_2
      - agent_3
    node:
      name: agent_merger_node
      type: merger_node # This node type must be able to take outputs from agent_1 and agent_2 and present them to its LLM.
      llm: openai_llm # Or your preferred LLM
      system_message: |
        tell me about the two names, what are they?
  - name: finalize
    after: agent_merger
    node:
      type: final_answer_node # This node would presumably take the JSON output from agent_merger and present it.