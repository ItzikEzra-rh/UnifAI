description: |
  A multi-agent pipeline that combines document retrieval, Slack context, and Jira tool execution to produce a single smart answer to user questions.

name: |
  Slack, Docs & Jira Search

# ----------------------------
# Providers
# ----------------------------
providers: []
# ----------------------------
# LLM Definitions
# ----------------------------
llms:
  - rid: openai_llm_rid
    name: openai_llm
    type: openai
    config:
      type: openai
      model_name: gemini-2.5-flash-lite
      api_key: AIzaSyCnplFW816wfu0jNAyoxQQSQkNdX8yxgQc
      base_url: https://generativelanguage.googleapis.com/v1beta/openai

# ----------------------------
# Retriever
# ----------------------------
retrievers: [ ]


# ----------------------------
# Tool Stubs
# ----------------------------
tools:
  - rid: ssh_tool_rid
    name: RHDP-2bf7x
    type: ssh_exec
    config:
      type: ssh_exec
      host: ssh.ocpv05.rhdp.net
      port: 31202
      username: lab-user
      password: WZO71ZhKmGHC

# ----------------------------
# Conditions
# ----------------------------
conditions: [ ]

nodes:
  - rid: user_question_node_rid
    name: User Question Node
    type: user_question_node
    config:
      type: user_question_node

  - rid: final_answer_node_rid
    name: Final Answer None
    type: final_answer_node
    config:
      type: final_answer_node

  - rid: agent_with_ssh_rid
    name: Agent With ssh exec
    type: custom_agent_node
    config:
      type: custom_agent_node
      llm: openai_llm_rid
      tools:
        - ssh_tool_rid
      system_message: ""

# ----------------------------
# Plan Steps
# ----------------------------
plan:
  - uid: user_input
    node: user_question_node_rid
    meta:
      display_name: User Question
      description: |
        The user inputs a question or request.

  ##### JIRA ######
  - uid: agent_with_ssh
    after: user_input
    node: agent_with_ssh_rid
    meta:
      display_name: Jira Agent
      description: |
        Get Jira data using JIRA tools

  - uid: finalize
    after: agent_with_ssh
    node: final_answer_node_rid
    meta:
      display_name: Final Answer
      description: |
        Provide the final answer to the user based on all gathered information.

