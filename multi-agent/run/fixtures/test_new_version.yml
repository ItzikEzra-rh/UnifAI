
# ─────────────────────────────────────────────────────────────────────────
# Resources -- one catalogue per kind
# ─────────────────────────────────────────────────────────────────────────


nodes:
  - rid: user_question
    name: user_question
    type: user_question_node
    config:
      type: user_question_node

  - rid: agent_node
    name: agent
    type: custom_agent_node
    config:
      type: custom_agent_node
      llm: $ref:a9968c7061b84532818805b68f66a307
      system_message: >
        You are a smart assistant …

  - rid: final_answer
    name: final_answer
    type: final_answer_node
    config:
      type: final_answer_node

# ─────────────────────────────────────────────────────────────────────────
# Graph plan – references node UIDs
# ─────────────────────────────────────────────────────────────────────────
plan:
  - uid: user_question
    node: user_question

  - uid: agent_node
    after: user_question
    node: agent_node

  - uid: final_answer
    after: agent_node
    node: final_answer
