# ----------------------------
# LLM Definitions
# ----------------------------
llms:
  - name: openai_llm
    type: openai
    model_name: Qwen/Qwen2.5-7B-Instruct

# ----------------------------
# Retriever
# ----------------------------
retrievers: [ ]

# ----------------------------
# Tool Stubs
# ----------------------------
tools: [ ]

# ----------------------------
# Conditions
# ----------------------------
conditions:
  - name: cond1
    type: threshold
    input_key: condition
    threshold: 5.0
    operator: ">"

# ----------------------------
# Plan Steps
# ----------------------------
plan:
  - name: user_input
    node:
      type: user_question_node

  - name: ask_llm
    after: user_input
    node:
      name: ask_llm_custom_agent
      type: custom_agent_node
      llm: openai_llm
      system_message: |
        you will get as an input some number, and you add to this number 1, and you just return the the output number nothing else.
    exit_condition: cond1
    branches:
      true: finalize
      false: ask_llm

  - name: finalize
    node:
      type: final_answer_node
