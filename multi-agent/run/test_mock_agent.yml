# ----------------------------
# LLM Definitions
# ----------------------------
llms:
  - name: mock_llm
    type: mock

# ----------------------------
# Retriever
# ----------------------------
retrievers: [ ]

# ----------------------------
# Tool Stubs
# ----------------------------
tools: [ ]

# ----------------------------
# Conditions
# ----------------------------
conditions:
  - name: cond1
    type: threshold
    input_key: input_key
    threshold: 5.0
    operator: ">"

# ----------------------------
# Plan Steps
# ----------------------------
plan:
  - name: user_input
    node:
      type: user_question_node

  - name: ask_mock
    after: user_input
    node:
      name: mock_agent
      type: mock_agent_node
      llm: mock_llm
    exit_condition: cond1
    branches:
      true: finalize
      false: ask_mock

  - name: finalize
    after: ask_mock
    node:
      type: final_answer_node
