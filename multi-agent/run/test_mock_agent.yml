# ----------------------------
# LLM Definitions
# ----------------------------
llms:
  - name: mock_llm
    type: mock

# ----------------------------
# Retriever / Tool Stubs
# ----------------------------
retrievers: [ ]
tools: [ ]

# ----------------------------
# Plan Steps
# ----------------------------
plan:
  - name: user_input
    node:
      type: user_question_node

  - name: ask_mock
    after: user_input
    node:
      name: mock_agent
      type: mock_agent_node
      llm: mock_llm

  - name: finalize
    after: ask_mock
    node:
      type: final_answer_node
