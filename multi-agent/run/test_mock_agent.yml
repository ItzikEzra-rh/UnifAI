# ----------------------------
# 1️⃣ LLM Definitions
# ----------------------------
llms:
  - name: mock_llm
    type: mock
    # mock factory can be configured to return a constant or random reply

# ----------------------------
# 2️⃣ Retriever / Tool Stubs
# (none needed for this example)
# ----------------------------
retrievers: []
tools: []

# ----------------------------
# 4️⃣ Plan Steps
# ----------------------------
plan:
  - name: user_input
    node: user_question

  - name: ask_mock
    after: user_input
    node:
      name: mock_agent
      type: mock
      llm: mock_llm

  - name: finalize
    after: ask_mock
    node: final_answer
