# ----------------------------
# LLM Definitions
# ----------------------------
llms:
  - name: openai_llm
    type: openai
    model_name: Qwen/Qwen2.5-7B-Instruct
    base_url: http://localhost:8000/v1

# ----------------------------
# Retriever
# ----------------------------
retrievers:
  - name: my_slack
    type: slack


# ----------------------------
# Tool Stubs
# ----------------------------
tools: [ ]

# ----------------------------
# Conditions
# ----------------------------
conditions: [ ]


# ----------------------------
# Plan Steps
# ----------------------------
plan:
  - name: user_input
    node:
      type: user_question_node

  - name: slack_agent
    after: user_input
    node:
      name: slack_agent_node
      type: custom_agent_node
      llm: openai_llm
      retriever: my_slack
      system_message: |
        you will get messages from slack as context, try to to answer the user question using the context, if its not relvant then answer that you don't know.

  - name: finalize
    after: slack_agent
    node:
      type: final_answer_node