# ----------------------------
# LLM Definitions
# ----------------------------
llms:
  - name: openai_llm
    type: openai
    model_name: Qwen/Qwen2.5-7B-Instruct
    base_url: http://localhost:8000/v1

# ----------------------------
# Retriever
# ----------------------------
retrievers:
  - name: my_docs
    type: docs


# ----------------------------
# Tool Stubs
# ----------------------------
tools: [ ]

# ----------------------------
# Conditions
# ----------------------------
conditions: [ ]


# ----------------------------
# Plan Steps
# ----------------------------
plan:
  - name: user_input
    node:
      type: user_question_node

  - name: docs_agent
    after: user_input
    node:
      name: docs_agent_node
      type: custom_agent_node
      llm: openai_llm
      retriever: my_docs
      system_message: |
        you will get docs as context, try to to answer the user question using the context also if you used the context mention what time, if its not relvant then answer that you don't know.

  - name: finalize
    after: docs_agent
    node:
      type: final_answer_node