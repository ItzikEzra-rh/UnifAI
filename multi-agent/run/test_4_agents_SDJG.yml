description: |
  This Blueprint defines a multi-agent system that processes user queries by coordinating multiple specialized assistants:
  - A Document Retrieval Assistant that answers using internal document excerpts.
  - A Slack Context Assistant that responds based on Slack message history.
  - A Jira Agent that utilizes tools to interact with Jira issues and projects.
  - A Gemini LLM Agent that provides general-purpose answers using model knowledge.

  The responses from these agents are then synthesized by a Merger Agent into a unified and actionable final answer.

display_name: |
  Slack, Docs, Jira & Gemini Search

display_description: |
  A multi-agent pipeline that combines document retrieval, Slack context, Jira tool execution, and general LLM reasoning to produce a single smart answer to user questions.



# ----------------------------
# Providers
# ----------------------------
providers:
  - name: mcp
    type: mcp_server
    sse_endpoint: http://10.46.254.131:8006/servers/mcp-atlassian/sse

# ----------------------------
# LLM Definitions
# ----------------------------
llms:
  - name: openai_llm
    type: openai
    model_name: gemini-2.5-flash
    api_key:
    base_url: https://generativelanguage.googleapis.com/v1beta/openai

# ----------------------------
# Retriever
# ----------------------------
retrievers:
  - name: my_docs
    type: docs
    top_k_results: 5
    api_url: https://unifai-rag-server-tag-ai--pipeline.apps.stc-ai-e1-prod.rtc9.p1.openshiftapps.com/api/docs/query.match

  - name: my_slack
    type: slack
    top_k_results: 5
    api_url: https://unifai-rag-server-tag-ai--pipeline.apps.stc-ai-e1-prod.rtc9.p1.openshiftapps.com/api/slack/query.match


# ----------------------------
# Tool Stubs
# ----------------------------
tools:
  - name: jira_get_issue_tool
    type: mcp_proxy
    tool_name: jira_get_issue
    provider: mcp

  - name: jira_search_tool
    type: mcp_proxy
    tool_name: jira_search
    provider: mcp

  - name: jira_get_project_issues_tool
    type: mcp_proxy
    tool_name: jira_get_project_issues
    provider: mcp

  - name: jira_create_issue_tool
    type: mcp_proxy
    tool_name: jira_create_issue
    provider: mcp

  - name: jira_link_to_epic_tool
    type: mcp_proxy
    tool_name: jira_link_to_epic
    provider: mcp

  - name: jira_update_issue_tool
    type: mcp_proxy
    tool_name: jira_update_issue
    provider: mcp

# ----------------------------
# Conditions
# ----------------------------
conditions: [ ]


# ----------------------------
# Plan Steps
# ----------------------------
plan:
  - uid: user_input
    node:
      type: user_question_node

  ##### DOCS ######
  - uid: docs_agent
    after: user_input
    node:
      name: docs_agent
      type: custom_agent_node
      llm: openai_llm
      retriever: my_docs
      system_message: |
        You are a Document Retrieval Assistant.
        • Use only the excerpts returned from the docs retriever as your context.
        • Answer the user’s question strictly from those document passages.
        • When quoting or paraphrasing, cite the document name in brackets (e.g., 'ProjectGuide.pdf').
        • mention all the documents names you take the info from(names not uid).
        • If no document passage is relevant, respond: “I’m sorry, I don’t know.”
    meta:
      display_name: Doc Agent
      description: |
        Retrieve doc data

  ##### SLACK ######
  - uid: slack_agent
    after: user_input
    node:
      name: slack_agent
      type: custom_agent_node
      llm: openai_llm
      retriever: my_slack
      system_message: |
        You are a Slack Context Assistant.
        • Use only the messages returned from the Slack retriever as your context.
        • Answer the user’s question strictly based on those Slack messages.
        • If you refer to a specific message, indicate the timestamp or author.
        • If no Slack message is relevant, respond: “I’m sorry, I don’t know.”
    meta:
      display_name: Slack Agent
      description: |
        Retrieve slack data


  ##### JIRA ######
  - uid: agent_with_jira
    after: user_input
    node:
      type: custom_agent_node
      llm: openai_llm
      tools:
        - jira_get_issue_tool
        - jira_search_tool
        - jira_get_project_issues_tool
        - jira_create_issue_tool
        - jira_link_to_epic_tool
        - jira_update_issue_tool
      system_message: |
        You are a smart assistant with access to Jira tools.

        Your job is to investigate any user question as if it might be related to Jira. Do not wait for confirmation or clarification before acting.

        When the user asks a question:
        - Assume Jira might be relevant, even if it isn’t mentioned explicitly.
        - Extract key terms or concepts from the question and begin exploring using your tools.
        - Start with exploratory tool calls (e.g., search) to discover related content.
        - When you get tool results, analyze them and decide whether additional tool calls are needed to clarify or deepen your understanding.
          For example, follow up a search result with a get or inspect tool to learn more.
        - Try different variations of search terms if the first attempts don’t produce useful insights.
        - Only ask the user for clarification if, after genuine effort using multiple tools, you still lack enough information to proceed.

        You must never say “I can’t help” without first investigating thoroughly using your tools. Your approach should be proactive, curious, and iterative: act first, reason through the data, and only then ask if needed.
    meta:
      display_name: Jira Agent
      description: |
        Get Jira data using JIRA tools

  ##### Gemni ######
  - uid: agent_with_gemni
    after: user_input
    node:
      type: custom_agent_node
      llm: openai_llm
    meta:
      display_name: Gemni LLM
      description: |
        Get answers using Gemni LLM

  ##### Merger ######
  - uid: agent_merger
    after:
      - docs_agent
      - slack_agent
      - agent_with_jira
      - agent_with_gemni
    node:
      name: agent_merger
      type: merger_node
      llm: openai_llm
      system_message: |
        You are the Merger Agent. Your task is to combine responses from multiple agents into one clear and helpful answer.

        1. **Merging answers**:
           - Start with the most specific and reliable information (e.g., command usage, documentation).
           - Add broader interpretations or alternate meanings afterward.
           - If agents disagree, mention both perspectives objectively.

        2. **Attribution**:
           - Indicate which agent provided each major section or idea once, at the beginning of that part (e.g., “According to the Document Agent…”).
           - Do not repeat tags after every sentence.

        3. **Reference preservation**:
           - If agents mention original sources (like file names or usernames), include them naturally in the sentence (e.g., `tm_cli_command.pdf`, `@alex`).

        4. **Missing information**:
           - If agents asked follow-up questions, include them at the end under:
             "**To improve this answer, consider providing:**"
           - Use only actual questions asked, and do not mention who asked them.

        Keep your tone professional, neutral, and easy to understand. Focus on clarity and usefulness.


    meta:
      display_name: Agent Unifier
      description: |
        Merge all agents' responses into a final answer

  - uid: finalize
    after: agent_merger
    node:
      type: final_answer_node
