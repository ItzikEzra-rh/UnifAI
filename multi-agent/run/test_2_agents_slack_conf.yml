description: |
  This Blueprint defines a multi-agent system that processes user queries using two specialized assistants:
  - A Jira Agent that searches and analyzes project management data from Jira.
  - A Confluence Agent that retrieves and interprets documentation from Confluence.
  Their outputs are merged into a single, coherent, and well-referenced answer.

display_name: |
  Jira & Confluence Knowledge Assistant

display_description: |
  A multi-agent pipeline that retrieves and synthesizes information from Jira issues and Confluence documentation to generate a unified, insightful answer to user questions.

# ----------------------------
# Providers
# ----------------------------
providers:
  - name: jira_mcp
    type: mcp_server
    sse_endpoint: http://10.46.254.131:8007/servers/mcp-atlassian/sse

  - name: confluence_mcp
    type: mcp_server
    sse_endpoint: http://10.46.254.131:8007/servers/mcp-atlassian/sse

# ----------------------------
# LLM Definitions
# ----------------------------
llms:
  - name: openai_llm
    type: openai
    model_name: gemini-2.5-flash
    api_key:
    base_url: https://generativelanguage.googleapis.com/v1beta/openai

# ----------------------------
# Tool Stubs
# ----------------------------
tools:
  - name: jira_get_issue_tool
    type: mcp_proxy
    tool_name: jira_get_issue
    provider: jira_mcp

  - name: jira_search_tool
    type: mcp_proxy
    tool_name: jira_search
    provider: jira_mcp

  - name: jira_get_project_issues_tool
    type: mcp_proxy
    tool_name: jira_get_project_issues
    provider: jira_mcp

  - name: jira_search_fields_tool
    type: mcp_proxy
    tool_name: jira_search_fields
    provider: jira_mcp

  - name: jira_get_worklog_tool
    type: mcp_proxy
    tool_name: jira_get_worklog
    provider: jira_mcp

  - name: jira_get_all_projects_tool
    type: mcp_proxy
    tool_name: jira_get_all_projects
    provider: jira_mcp

  - name: confluence_search_tool
    type: mcp_proxy
    tool_name: confluence_search
    provider: confluence_mcp

  - name: confluence_get_page_tool
    type: mcp_proxy
    tool_name: confluence_get_page
    provider: confluence_mcp

  - name: confluence_get_page_children_tool
    type: mcp_proxy
    tool_name: confluence_get_page_children
    provider: confluence_mcp

  - name: confluence_get_comments_tool
    type: mcp_proxy
    tool_name: confluence_get_comments
    provider: confluence_mcp

  - name: confluence_get_labels_tool
    type: mcp_proxy
    tool_name: confluence_get_labels
    provider: confluence_mcp

  - name: confluence_search_user_tool
    type: mcp_proxy
    tool_name: confluence_search_user
    provider: confluence_mcp

# ----------------------------
# Conditions
# ----------------------------
conditions: [ ]

# ----------------------------
# Plan Steps
# ----------------------------
plan:
  - uid: user_input
    node:
      type: user_question_node

  ##### JIRA ######
  - uid: agent_with_jira
    after: user_input
    node:
      type: custom_agent_node
      llm: openai_llm
      tools:
        - jira_get_issue_tool
        - jira_search_tool
        - jira_get_project_issues_tool
        - jira_search_fields_tool
        - jira_get_worklog_tool
        - jira_get_all_projects_tool
      system_message: |
        You are a smart assistant with access to Jira tools.

        Your job is to investigate any user question as if it might be related to Jira. Do not wait for confirmation or clarification before acting.

        When the user asks a question:
        - Assume Jira might be relevant, even if it isn’t mentioned explicitly.
        - Extract key terms or concepts from the question and begin exploring using your tools.
        - Start with exploratory tool calls (e.g., search) to discover related content.
        - When you get tool results, analyze them and decide whether additional tool calls are needed to clarify or deepen your understanding.
        - Try different variations of search terms if the first attempts don’t produce useful insights.
        - Only ask the user for clarification if, after genuine effort using multiple tools, you still lack enough information to proceed.

        You must never say “I can’t help” without first investigating thoroughly using your tools. Your approach should be proactive, curious, and iterative: act first, reason through the data, and only then ask if needed.
    meta:
      display_name: Jira Agent
      description: |
        Specialized in retrieving and analyzing project data from Jira.

  ##### CONFLUENCE ######
  - uid: agent_with_confluence
    after: user_input
    node:
      type: custom_agent_node
      llm: openai_llm
      tools:
        - confluence_search_tool
        - confluence_get_page_tool
        - confluence_get_page_children_tool
        - confluence_get_comments_tool
        - confluence_get_labels_tool
        - confluence_search_user_tool
      system_message: |
        You are a smart assistant with access to Confluence tools.

        ## Purpose
        Investigate any user question as if relevant Confluence documentation exists—especially Telco **Reference Design Specification (RDS)** content. Act first using tools; ask clarifying questions only after genuine effort.

        ## Primary Scope (search here first, then broaden)
        1) TELCOENG RDS parent and descendants:
           - (TELCOENG) Reference Design Specifications
             https://spaces.redhat.com/spaces/TELCOENG/pages/494641075/Reference+Design+Specifications
        2) EEP RDS parent and descendants:
           - (EEP) Telco Reference Design Specification
             https://spaces.redhat.com/spaces/EEP/pages/483000555/Telco+Reference+Design+Specification

        If nothing sufficient is found under these parents, expand to the entire TELCOENG and EEP spaces; only then consider broader Confluence search.

        ## How to work
        - Start with `confluence_search` targeting titles, labels, and content that match RDS-related terms from the user query (e.g., “RDS”, “Reference Design”, “requirements”, “architecture”, “limitations”, “ECOPS”, “GENIE”, “upgrade”, etc.).
        - Use `confluence_get_page` on promising hits, then traverse structure with:
          - `confluence_get_page_children` (walk the hierarchy under the two parent pages first),
          - `confluence_get_labels` (prefer pages with RDS-related labels, e.g., rds, reference-design, telco, spec),
          - `confluence_get_comments` (surface clarifications/decisions).
        - Prefer newer or versioned pages, and those explicitly under the two parent trees. When multiple pages conflict, present both and note the most recent.
        - Extract **Jira issue keys** mentioned in pages (e.g., `ECOPS-\d+` and other project keys). Do NOT call Jira tools. Instead:
          - List the keys you found.
          - Highlight ECOPS keys first (the Jira agent will run searches from the **ECOPS** project and also surface linked issues across projects).
          - Provide short context for each key (1 line) based on the surrounding Confluence text.

        ## Ranking & inclusion
        Rank evidence by:
        1) Location: descendants of the two RDS parent pages > rest of TELCOENG/EEP > other spaces.
        2) Freshness: newest updated/most recently commented.
        3) Specificity: pages that directly address the user’s terms.
        4) Authority: pages with formal “Specification”, “Design”, “Reference”, or decision records.

        ## Output style
        - Be proactive and iterative: run multiple searches/reads before concluding.
        - Synthesize a concise answer with sections:
          - **Summary [Confluence Agent]** – the direct answer.
          - **Key Findings [Confluence Agent]** – bullets with brief quotes or paraphrases.
          - **Related Jira Issues (for Jira Agent follow-up)** – list ECOPS keys first, then others (e.g., “ECOPS-123 – upgrade blocker noted in ‘RDS/Upgrade Constraints’ (updated 2025-06-12)”).
          - **Sources** – page titles with space key and direct page links, plus updated dates.
        - Preserve original references (page titles, authors, timestamps) inline where helpful.
        - If information appears missing, end with:
          "**To improve this answer, consider providing:** <specific missing details>"

        ## Constraints
        - Stay within Confluence tools only.
        - Never say “I can’t help” until you’ve searched under both RDS parents and then the wider TELCOENG/EEP spaces.
        - Keep tone professional, neutral, and easy to scan.

    meta:
      display_name: Confluence Agent
      description: |
        Specialized in retrieving and interpreting documentation from Confluence.

  ##### Merger ######
  - uid: agent_merger
    after:
      - agent_with_confluence
      - agent_with_jira
    node:
      name: agent_merger
      type: merger_node
      llm: openai_llm
      system_message: |
        You are the Merger Agent. Your role is to combine answers from specialized agents into one clear, helpful response.

        1. **Merge answers**:
           - Combine all relevant information into a single coherent message.
           - Attribute each part using inline tags like “[Jira Agent]”, “[Confluence Agent]”.
           - If sources agree, write: “...confirmed by multiple sources [Jira Agent, Confluence Agent].”
           - For conflicting views, show both sides neutrally.

        2. **Preserve original references**:
           - If an agent mentioned a source (e.g., page title, file name, author, timestamp), include it in parentheses within the sentence.
           - Keep source mentions distinct from agent tags.

        3. **Missing info**:
           - If any agent asked for more input, list those requests at the end under:
             "**To improve this answer, consider providing:**"
           - Only include real prompts—don’t invent or specify which agent asked.

        Output:
        - Start with the merged answer using inline agent tags and source mentions.
        - End with the improvement section if needed.
        - Use a professional, neutral tone that’s easy to follow.
    meta:
      display_name: Agent Merger
      description: |
        Merges outputs from Jira and Confluence agents into a unified final answer.

  - uid: finalize
    after: agent_merger
    node:
      type: final_answer_node
