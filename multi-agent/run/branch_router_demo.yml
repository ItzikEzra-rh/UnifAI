description: |
  Demo blueprint showing branch chooser node feeding into router direct condition that 
  routes to one of two mock agent instances, then to finalize node.

name: |
  Branch Chooser & Router Demo

# ----------------------------
# LLM Definitions (minimal for mock agents)
# ----------------------------
llms: [ ]

# ----------------------------
# Nodes
# ----------------------------
nodes:
  - rid: user_input
    name: user_input
    type: user_question_node
    config:
      type: user_question_node

  - rid: branch_chooser
    name: branch_chooser
    type: branch_chooser_node
    config:
      type: branch_chooser_node
      default_branch: "mock_agent_1_step"

  - rid: mock_agent_1
    name: mock_agent
    type: mock_agent_node
    config:
      type: mock_agent_node
      echo_message: "This is Mock Agent 1 responding!"

  - rid: mock_agent_2
    name: mock_agent
    type: mock_agent_node
    config:
      type: mock_agent_node
      echo_message: "This is Mock Agent 2 responding!"

  - rid: final_answer
    name: final_answer
    type: final_answer_node
    config:
      type: final_answer_node

# ----------------------------
# Conditions
# ----------------------------
conditions:
  - rid: router_direct
    name: target_router
    type: router_direct
    config:
      type: router_direct
      default_target: "mock_agent_1_step"

# ----------------------------
# Plan Steps
# ----------------------------
plan:
  - uid: user_input
    node: user_input
    meta:
      display_name: User Question
      description: |
        The user inputs a question or request to start the pipeline.

  - uid: branch_chooser
    after: user_input
    node: branch_chooser
    exit_condition: router_direct
    branches:
      mock_agent_1_step: mock_agent_1_step
      mock_agent_2_step: mock_agent_2_step
    meta:
      display_name: Branch Chooser
      description: |
        Analyzes the step context and chooses the first available target branch.
        Writes the chosen branch to target_branch state channel.

  # Mock Agent 1 instance
  - uid: mock_agent_1_step
    node: mock_agent_1
    meta:
      display_name: Mock Agent 1
      description: |
        First mock agent instance that responds with a predefined message.
        Simulates agent processing and response generation.

  # Mock Agent 2 instance  
  - uid: mock_agent_2_step
    node: mock_agent_2
    meta:
      display_name: Mock Agent 2
      description: |
        Second mock agent instance that responds with a different predefined message.
        Simulates alternative agent processing path.

  # Both mock agents converge to final answer
  - uid: final_answer
    after:
      - mock_agent_1_step
      - mock_agent_2_step
    node: final_answer
    meta:
      display_name: Final Answer
      description: |
        Produces the final output based on the selected mock agent's response.
        Consolidates the pipeline results into a final answer.