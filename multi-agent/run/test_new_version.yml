
# ─────────────────────────────────────────────────────────────────────────
# Resources -- one catalogue per kind
# ─────────────────────────────────────────────────────────────────────────


llms:
  - alias: llm_gemni_openai
    config:
      ref: "58b3f168cbb64b6d8eac92732c6f7d70"


nodes:
  - alias: user_question
    config:
      name: User Input
      type: user_question_node

  - alias: agent_node
    config:
      name: My Agent
      type: custom_agent_node
      llm: llm_gemni_openai
      system_message: >
        You are a smart assistant …

  - alias: final_answer
    config:
      type: final_answer_node

# ─────────────────────────────────────────────────────────────────────────
# Graph plan – references node UIDs
# ─────────────────────────────────────────────────────────────────────────
plan:
  - alias: user_question
    node: user_question

  - alias: agent_node
    after: user_question
    node: agent_node

  - alias: final_answer
    after: agent
    node: final_answer
