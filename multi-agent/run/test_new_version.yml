
# ─────────────────────────────────────────────────────────────────────────
# Resources -- one catalogue per kind
# ─────────────────────────────────────────────────────────────────────────


nodes:
  - rid: user_question
    name: user_question
    type: user_question_node
    config:
      name: User Input

  - rid: agent_node
    name: agent
    type: custom_agent_node
    config:
      name: My Agent
      llm: $ref:22ab2710e8a748f99c6e9b54f406031c
      system_message: >
        You are a smart assistant …

  - rid: final_answer
    name: final_answer
    type: final_answer_node
    config:
      name: Final Answer

# ─────────────────────────────────────────────────────────────────────────
# Graph plan – references node UIDs
# ─────────────────────────────────────────────────────────────────────────
plan:
  - uid: user_question
    node: user_question

  - uid: agent_node
    after: user_question
    node: agent_node

  - uid: final_answer
    after: agent_node
    node: final_answer
