
# ─────────────────────────────────────────────────────────────────────────
# Resources -- one catalogue per kind
# ─────────────────────────────────────────────────────────────────────────


nodes:
  - rid: user_question
    name: user_question
    config:
      name: User Input
      type: user_question_node

  - rid: agent_node
    name: agent
    config:
      name: My Agent
      type: custom_agent_node
      llm: $ref:af1b9b2900284ed79192e4ebbf8a05cf
      system_message: >
        You are a smart assistant …

  - rid: final_answer
    name: final_answer
    config:
      type: final_answer_node

# ─────────────────────────────────────────────────────────────────────────
# Graph plan – references node UIDs
# ─────────────────────────────────────────────────────────────────────────
plan:
  - uid: user_question
    node: user_question

  - uid: agent_node
    after: user_question
    node: agent_node

  - uid: final_answer
    after: agent_node
    node: final_answer
