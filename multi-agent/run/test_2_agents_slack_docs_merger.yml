description: |
  This Blueprint defines a modular multi-agent system that integrates specialized assistants to handle user queries by:
  - Searching internal documents
  - Parsing relevant Slack messages
  - Executing Jira operations via tools
  - Synthesizing multi-source answers into a final response

display_name: |
  Unified Knowledge Search: Docs, Slack & Jira

display_description: |
  A multi-agent pipeline that combines document search, Slack message analysis, and Jira tool usage to generate a unified answer to user questions.

# ----------------------------
# Providers
# ----------------------------
providers:
  - name: mcp
    type: mcp_server
    sse_endpoint: http://127.0.0.1:8006/servers/mcp-atlassian/sse

# ----------------------------
# LLM Definitions
# ----------------------------
llms:
  - name: openai_llm
    type: openai
    model_name: gemini-2.0-flash
    api_key: AIzaSyBwuQtKPtwKILBulq_YW16RKjMAVx4gbKQ
    base_url: https://generativelanguage.googleapis.com/v1beta/openai

# ----------------------------
# Retriever
# ----------------------------
retrievers:
  - name: my_docs
    type: docs
    top_k_results: 5

  - name: my_slack
    type: slack
    top_k_results: 5

# ----------------------------
# Tool Stubs
# ----------------------------
tools:
  - name: jira_get_issue_tool
    type: mcp_proxy
    tool_name: jira_get_issue
    provider: mcp

  - name: jira_search_tool
    type: mcp_proxy
    tool_name: jira_search
    provider: mcp

  - name: jira_get_project_issues_tool
    type: mcp_proxy
    tool_name: jira_get_project_issues
    provider: mcp

  - name: jira_create_issue_tool
    type: mcp_proxy
    tool_name: jira_create_issue
    provider: mcp

  - name: jira_link_to_epic_tool
    type: mcp_proxy
    tool_name: jira_link_to_epic
    provider: mcp

  - name: jira_update_issue_tool
    type: mcp_proxy
    tool_name: jira_update_issue
    provider: mcp

# ----------------------------
# Conditions
# ----------------------------
conditions: [ ]

# ----------------------------
# Plan Steps
# ----------------------------
plan:
  ## Step 1: Capture the user's question
  - uid: user_input
    node:
      type: user_question_node
    meta:
      display_name: User Question
      description: |
        Captures the user's question to be answered by the agents.

  ## Step 2: Document Retrieval Agent
  - uid: docs_agent
    after: user_input
    node:
      name: docs_agent
      type: custom_agent_node
      llm: openai_llm
      retriever: my_docs
      system_message: |
        You are a Document Retrieval Assistant specialized in answering questions using internal documents.

        Guidelines:
        - Use only the excerpts retrieved from the document retriever.
        - Do not rely on prior knowledge or assumptions.
        - When quoting or paraphrasing, cite the document name in brackets (e.g., [ProjectGuide.pdf]).
        - Mention all source document names explicitly if more than one is used.
        - If none of the excerpts are relevant, say: “I’m sorry, I don’t know.”
    meta:
      display_name: Document Agent
      description: |
        Answers questions by extracting and summarizing content from internal documentation.

  ## Step 3: Slack Message Retrieval Agent
  - uid: slack_agent
    after: user_input
    node:
      name: slack_agent
      type: custom_agent_node
      llm: openai_llm
      retriever: my_slack
      system_message: |
        You are a Slack Context Assistant.
        • Use only the messages returned from the Slack retriever as your context.
        • Answer the user’s question strictly based on those Slack messages.
        • If you refer to a specific message, indicate the timestamp or author.
        • If no Slack message is relevant, respond: “I’m sorry, I don’t know.”
    meta:
      display_name: Slack Agent
      description: |
        Retrieve slack data

  - uid: agent_merger
    after:
      - docs_agent
      - slack_agent
    node:
      name: agent_merger
      type: merger_node
      llm: openai_llm
      system_message: |
        You are a Multi-Source Synthesis Assistant.
        • You have two inputs: the “Docs Assistant” answer and the “Slack Assistant” answer.
        • Combine them into one concise, coherent response.
        • If they agree, merge seamlessly; if they conflict, note the discrepancy.
        • If both say “I’m sorry, I don’t know,” respond: “I’m sorry, I don’t know.”

  - uid: finalize
    after: agent_merger
    node:
      type: final_answer_node
