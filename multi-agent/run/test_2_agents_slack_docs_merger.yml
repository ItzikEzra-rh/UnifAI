description: |
  This Blueprint defines a multi-agent system that integrates two agents:
  - A Document Retrieval Assistant that answers questions based on document excerpts.
  - A Slack Context Assistant that answers questions based on Slack messages.
  The responses from both agents are merged into a final answer.

display_name: |
  Document & Slack Search

display_description: |
  A pipeline that searches through docs and Slack messages to answer user queries

# ----------------------------
# LLM Definitions
# ----------------------------
llms:
  - name: openai_llm
    type: openai
    model_name: Qwen/Qwen2.5-7B-Instruct
    base_url: http://localhost:8000/v1
    temperature: 0.7

# ----------------------------
# Retriever
# ----------------------------
retrievers:
  - name: my_docs
    type: docs
    top_k_results: 5

  - name: my_slack
    type: slack


# ----------------------------
# Tool Stubs
# ----------------------------
tools: [ ]

# ----------------------------
# Conditions
# ----------------------------
conditions: [ ]


# ----------------------------
# Plan Steps
# ----------------------------
plan:
  - name: user_input
    node:
      type: user_question_node

  - name: docs_agent
    after: user_input
    node:
      name: docs_agent
      type: custom_agent_node
      llm: openai_llm
      retriever: my_docs
      system_message: |
        You are a Document Retrieval Assistant.
        • Use only the excerpts returned from the docs retriever as your context.
        • Answer the user’s question strictly from those document passages.
        • If you quote or paraphrase, include the source document name in brackets.
        • mention all the documents names you take the info from.
        • If no document passage is relevant, respond: “I’m sorry, I don’t know.”
      meta:
        display_name: Doc Agent
        description: |
          Retrieve doc data

  - name: slack_agent
    after: user_input
    node:
      name: slack_agent
      type: custom_agent_node
      llm: openai_llm
      retriever: my_slack
      system_message: |
        You are a Slack Context Assistant.
        • Use only the messages returned from the Slack retriever as your context.
        • Answer the user’s question strictly based on those Slack messages.
        • If you refer to a specific message, indicate the timestamp or author.
        • If no Slack message is relevant, respond: “I’m sorry, I don’t know.”
      meta:
        display_name: Slack Agent
        description: |
          Retrieve slack data

  - name: agent_merger
    after:
      - docs_agent
      - slack_agent
    node:
      name: agent_merger
      type: merger_node
      llm: openai_llm
      system_message: |
        You are a Multi-Source Synthesis Assistant.
        • You have two inputs: the “Docs Assistant” answer and the “Slack Assistant” answer.
        • Combine them into one concise, coherent response.
        • If they agree, merge seamlessly; if they conflict, note the discrepancy.
        • If both say “I’m sorry, I don’t know,” respond: “I’m sorry, I don’t know.”

  - name: finalize
    after: agent_merger
    node:
      type: final_answer_node
