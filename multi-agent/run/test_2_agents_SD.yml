description: |
  This Blueprint defines a multi-agent system that processes user queries using two specialized assistants:
  - A Document Retrieval Assistant that answers using internal document excerpts.
  - A Slack Context Assistant that responds based on Slack message history.

  The responses from these agents are synthesized by a Merger Agent into a unified and helpful final answer.

display_name: |
  Slack & Docs Search

display_description: |
  A multi-agent pipeline that retrieves information from internal documents and Slack messages to generate a single smart answer to user questions.



# ----------------------------
# Providers
# ----------------------------
providers: [ ]

# ----------------------------
# LLM Definitions
# ----------------------------
llms:
  - name: openai_llm
    type: openai
    model_name: gemini-2.5-flash
    api_key:
    base_url: https://generativelanguage.googleapis.com/v1beta/openai

# ----------------------------
# Retriever
# ----------------------------
retrievers:
  - name: my_docs
    type: docs
    top_k_results: 5
    api_url: https://unifai-dataflow-server-tag-ai--pipeline.apps.stc-ai-e1-prod.rtc9.p1.openshiftapps.com/api/docs/query.match

  - name: my_slack
    type: slack
    top_k_results: 5
    api_url: https://unifai-dataflow-server-tag-ai--pipeline.apps.stc-ai-e1-prod.rtc9.p1.openshiftapps.com/api/slack/query.match


# ----------------------------
# Tool Stubs
# ----------------------------
tools: [ ]

# ----------------------------
# Conditions
# ----------------------------
conditions: [ ]


# ----------------------------
# Plan Steps
# ----------------------------
plan:
  - uid: user_input
    node:
      type: user_question_node

  ##### DOCS ######
  - uid: docs_agent
    after: user_input
    node:
      name: docs_agent
      type: custom_agent_node
      llm: openai_llm
      retriever: my_docs
      system_message: |
        You are a Document Retrieval Assistant.
        • Use only the excerpts returned from the docs retriever as your context.
        • Answer the user’s question strictly from those document passages.
        • When quoting or paraphrasing, cite the document name in brackets (e.g., 'ProjectGuide.pdf').
        • mention all the documents names you take the info from(names not uid).
        • If no document passage is relevant, respond: “I’m sorry, I don’t know.”
    meta:
      display_name: Doc Agent
      description: |
        Retrieve doc data

  ##### SLACK ######
  - uid: slack_agent
    after: user_input
    node:
      name: slack_agent
      type: custom_agent_node
      llm: openai_llm
      retriever: my_slack
      system_message: |
        You are a Slack Context Assistant.
        • Use only the messages returned from the Slack retriever as your context.
        • Answer the user’s question strictly based on those Slack messages.
        • If you refer to a specific message, indicate the timestamp or author.
        • If no Slack message is relevant, respond: “I’m sorry, I don’t know.”
    meta:
      display_name: Slack Agent
      description: |
        Retrieve slack data

    ##### Merger ######
  - uid: agent_merger
    after:
      - docs_agent
      - slack_agent
    node:
      name: agent_merger
      type: merger_node
      llm: openai_llm
      system_message: |
        You are the Merger Agent. Your role is to combine answers from specialized agents into one clear, helpful response.

        1. **Merge answers**:
           - Combine all relevant information into a single coherent message.
           - Attribute each part using inline tags like “[Slack Agent]”, “[Document Agent]”, etc.
           - If sources agree, write: “...confirmed by multiple sources [Slack Agent, Document Agent].”
           - For conflicting views, show both sides neutrally.

        2. **Preserve original references**:
           - If an agent mentioned a source (e.g., PDF name, Slack user, timestamp), include it in parentheses within the sentence.
           - Keep source mentions (like file names or authors) distinct from agent tags.

        3. **Missing info**:
           - If any agent asked for more input, list those requests at the end under:
             "**To improve this answer, consider providing:**"
           - Only include real prompts—don’t invent or specify which agent asked.

        Output:
        - Start with the merged answer using inline agent tags and source mentions.
        - End with the improvement section if needed.
        - Use a professional, neutral tone that’s easy to follow.
    meta:
      display_name: Agent Unifier
      description: |
        Merge all agents' responses into a final answer

  - uid: finalize
    after: agent_merger
    node:
      type: final_answer_node
