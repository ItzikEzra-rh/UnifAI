# Default values for ui.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

#The ports variables are left empty when using deployment over ocp as the routes usually direct to the target service which is port specific.
#In cases where a backend resides on a separate server then a address and port are needed.
#In addition when using the load balancerservice location instead of a route a port specification might be needed as well.
#The current implementation covers these 2 "edge" cases. 
env:
  NGINX_PORT: "8080"
  DATAPIPELINEHUB_PORT: ""
  DATAPIPELINEHUB_HOST: "unifai-dataflow-server-tag-ai--pipeline.apps.stc-ai-e1-prod.rtc9.p1.openshiftapps.com"
  MULTIAGENT_PORT: "8003"
  MULTIAGENT_HOST: "10.46.254.131"
  SCHEME: "https"

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  portList:
  - name: ui
    port: 8080
  - name: df-backend
    port: 13456
  - name: ma-backend
    port: 8003
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: LoadBalancer



