# Default values for ui.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

#The ports variables are left empty when using deployment over ocp as the routes usually direct to the target service which is port specific.
#In cases where a backend resides on a separate server then a address and port are needed.
#In addition when using the load balancerservice location instead of a route a port specification might be needed as well.
#The current implementation covers these 2 "edge" cases.

# "unifai-dataflow-server-tag-ai--pipeline.apps.stc-ai-e1-prod.rtc9.p1.openshiftapps.com"
# https://unifai-dataflow-server-tag-ai--pipeline.apps.stc-ai-e1-pp.imap.p1.openshiftapps.com

env:
  NGINX_PORT: "8080"
  DATAPIPELINEHUB_PORT: ""
  DATAPIPELINEHUB_HOST: "http://unifai-dataflow-server-tag-ai--pipeline.apps.stc-ai-e1-pp.imap.p1.openshiftapps.com"
  MULTIAGENT_PORT: ""
  MULTIAGENT_HOST: "http://unifai-multiagent-be-tag-ai--pipeline.apps.stc-ai-e1-pp.imap.p1.openshiftapps.com"

image:
  repository: images.paas.redhat.com/unifai/datapipelinehub/ui
  tag: "latest"
  pullPolicy: Always

service:
  portList:
  - name: ui
    port: 8080
  - name: df-backend
    port: 13456
  - name: ma-backend
    port: 8003
  type: LoadBalancer

route:
  host: unifai-ui-tag-ai--pipeline.apps.stc-ai-e1-pp.imap.p1.openshiftapps.com
