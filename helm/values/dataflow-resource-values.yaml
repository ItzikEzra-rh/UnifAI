env:
    qdrant_ip: "http://qdrant"
    qdrant_port: "6333"
    SHARED_STORAGE: "/app/shared"

unifai_dataflow_server:
  replicaCount: 1
  image:
    repository: images.paas.redhat.com/genie/unifai/unifai-dataflow
    tag: "latest"
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 13456
    env:
      ROLE: "flask"
      SHARED_STORAGE: "/app/shared"

unifai_dataflow_celery:
  replicaCount: 1
  image:
    repository: images.paas.redhat.com/genie/unifai/unifai-dataflow
    tag: "latest"
    pullPolicy: Always
  env:
    ROLE: "celery"
    SHARED_STORAGE: "/app/shared"
    CELERY_QUEUES: "slack_queue,document_queue,registration_queue"
    CELERY_WORKER: 1
