# InternLM2.5-7B-Chat-1M specific values file
# This file inherits from values.yaml and overrides only InternLM2.5-7B-Chat-1M specific parameters
# Usage: helm install vllm-internlm2.5-7b ./helm/shared-resources/vllm-serving-engine -f helm/values/vllm-internlm2.5-7b-chat-1m-values.yaml

# Model configuration - InternLM2.5-7B-Chat-1M specific (1M token context)
model:
  name: "internlm/internlm2_5-7b-chat-1m"
  localModelPath: "/models/internlm2_5-7b-chat-1m"
  maxModelLen: "1025056"  # Maximum feasible on A100-40GB (as suggested by error)
  quantization: ""  # No quantization for optimal quality with 1M context
  toolCallParser: ""
  ropeScaling: {}  # Model natively supports 1M tokens without RoPE scaling
  # Custom arguments optimized for 1M context processing with 4 GPUs
  customArgs:
    - "--trust-remote-code"  # Required for InternLM models
    - "--max-num-batched-tokens=4096"  # Increased batching for multi-GPU setup
    - "--max-num-seqs=4"  # Allow more sequences with 4 GPUs
    - "--disable-log-stats"  # Reduce logging overhead
    - "--enforce-eager"  # Disable CUDA graphs for compatibility with long context
  # Environment variables optimized for InternLM and long context
  env:
    VLLM_USE_MODELSCOPE: "False"
    PYTORCH_CUDA_ALLOC_CONF: "max_split_size_mb:512"
    VLLM_WORKER_MULTIPROC_METHOD: "spawn"
    VLLM_TRUST_REMOTE_CODE: "True"  # Required for InternLM models

# InternLM2.5-7B-Chat-1M specific resource requirements (optimized for full 1M context)
# Note: Adjusted based on cluster limits (previous analysis showed max 48Gi memory, 8 CPU)
resources:
  limits:
    cpu: '8'   # Keep within cluster CPU limits
    memory: 48Gi  # Keep within observed cluster memory limits
    nvidia.com/gpu: 4  # 4 GPUs for full 1M context capability
  requests:
    cpu: '4'
    memory: 32Gi  # Conservative request for 4-GPU setup
    nvidia.com/gpu: 4

# GPU configuration for 4-GPU tensor parallel setup
gpu:
  count: 4
  deviceIds: []

vllm:
  # vLLM settings optimized for 1M context with 4-GPU tensor parallelism
  gpuMemoryUtilization: "0.95"  # Maximum utilization to get more KV cache memory
  tensorParallelSize: "4"  # 4-way tensor parallelism for full 1M context
  enableAutoToolChoice: false
  disableLogRequests: true  # Reduce logging overhead for long sequences

# Extended health probe timing for full 1M context model with 4 GPUs (longer startup)
healthProbes:
  readinessProbe:
    enabled: true
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 600  # 10 minutes - much longer for 4-GPU tensor parallel setup
    periodSeconds: 20
    timeoutSeconds: 15
    successThreshold: 1
    failureThreshold: 30
  livenessProbe:
    enabled: true
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 720  # 12 minutes - longer for 4-GPU initialization
    periodSeconds: 40
    timeoutSeconds: 15
    successThreshold: 1
    failureThreshold: 15

# Environment variables optimized for 1M context processing and InternLM
env:
  HOME: "/tmp"
  HF_HOME: "/models/.cache"
  TORCH_COMPILE_DISABLE: "1"
  NCCL_DEBUG: "INFO"
  NCCL_P2P_LEVEL: "LOC"
  NCCL_SOCKET_IFNAME: "^docker,lo"
  VLLM_RAY_START_UP_TIMEOUT_S: "3600"  # 60 minutes for 4-GPU tensor parallel setup
  VLLM_WORKER_USE_RAY: "0"
  VLLM_CONFIG_ROOT: "/models/.cache"
  VLLM_CACHE_ROOT: "/models/.cache"
  CUDA_LAUNCH_BLOCKING: "0"
  TOKENIZERS_PARALLELISM: "true"
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
  VLLM_WORKER_MULTIPROC_METHOD: "spawn"
  VLLM_ENGINE_ITERATION_TIMEOUT_S: "2400"  # 40 minutes for 1M context sequences
  # Memory optimization for 1M context with 4 GPUs
  PYTORCH_CUDA_ALLOC_CONF: "max_split_size_mb:1024"
  CUDA_VISIBLE_DEVICES: "0,1,2,3"  # All 4 GPUs
  # InternLM specific settings
  VLLM_TRUST_REMOTE_CODE: "True"
  # Multi-GPU communication settings
  NCCL_TIMEOUT: "3600"
  NCCL_IB_DISABLE: "1"  # Disable InfiniBand if not available

# Volume configuration for large model storage
volumes:
  dshm:
    enabled: true
    medium: Memory
    sizeLimit: "32Gi"  # Shared memory for 1M context with 4 GPUs (within memory limits)
  modelCache:
    enabled: true
    storageClass: "aws-ebs"
    size: "200Gi"  # Larger storage for model and cache
    accessMode: "ReadWriteOnce"
    retainOnDelete: true
  flashinferCache:
    enabled: true

# Node affinity to ensure deployment on GPU nodes (relaxed for testing)
affinity:
  nodeAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      preference:
        matchExpressions:
        - key: nvidia.com/gpu.product
          operator: In
          values:
          - NVIDIA-A100-SXM4-40GB  # Prefer A100-40GB GPUs
          - NVIDIA-A100-SXM4-80GB  # Also support 80GB if available
          - NVIDIA-H100-SXM5-80GB  # H100 also supported

# Additional tolerations for high-memory GPU nodes
tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule
  - key: tenant
    operator: Equal
    value: rh-jarvis-ai-a100
    effect: NoSchedule
  - key: tenant
    operator: Equal
    value: llmaas-a100
    effect: NoSchedule
  - key: tenant
    operator: Equal
    value: rh-jarvis-ai
    effect: NoSchedule
  - key: tenant
    operator: Equal
    value: llmaas
    effect: NoSchedule
  - key: high-memory-gpu
    operator: Equal
    value: "true"
    effect: NoSchedule
