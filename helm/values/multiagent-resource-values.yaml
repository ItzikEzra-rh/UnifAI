multiagent_server:
  resources: 
    limits:
      cpu: '2'
      memory: '16Gi'
    requests:
      cpu: '2'
      memory: '8Gi'
  image: 
    repository: images.paas.redhat.com/unifai/multiagent/backend
    tag: "latest"
  service:
    type: ClusterIP
    port: "8080"
  env:
    BACKEND_ENV: "production" #options - production development
    ROLE: "flask" # options are flask celery debug