# GPT-OSS-20B specific values file
# This file inherits from values.yaml and overrides only GPT-OSS-20B specific parameters
# Usage: helm install vllm-gpt-oss ./helm/shared-resources/vllm-serving-engine -f ../values-gpt-oss-20b.yaml

# Model configuration - Enable GPT-OSS-20B, disable others
image:
  repository: vllm/vllm-openai
  pullPolicy: Always
  tag: "gptoss"


# Model configuration - GPT-OSS-20B specific
model:
  name: "openai/gpt-oss-20b"
  localModelPath: "/models/gpt-oss-20b"
  maxModelLen: "110000"
  # quantization: "fp16"  # commented out
  # toolCallParser: "hermes"  # commented out
  ropeScaling: {}
  # Custom arguments for vllm serve command
  customArgs:
    - "--async-scheduling"
  # Custom environment variables for this model
  env:
    VLLM_ATTENTION_BACKEND: "TRITON_ATTN_VLLM_V1"

# GPT-OSS-20B specific resource requirements (optimized for FP16, single GPU)
resources:
  limits:
    cpu: '4'
    memory: 32Gi
    nvidia.com/gpu: 2
  requests:
    cpu: '3'
    memory: 16Gi
    nvidia.com/gpu: 2
volumes:
  modelCache:
    size: 150G







# GPT-OSS-20B specific vLLM configuration (single GPU)
vllm:
  #enableAutoToolChoice: true
  tensorParallelSize: "2"
