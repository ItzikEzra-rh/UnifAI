# Qwen2.5-7B-Instruct-1M specific values file
# This file inherits from values.yaml and overrides only Qwen2.5-7B-Instruct-1M specific parameters
# Usage: helm install vllm-qwen2.5-7b ./helm/shared-resources/vllm-serving-engine -f helm/values/vllm-qwen2.5-7b-instruct-1m-values.yaml

# Model configuration - Qwen2.5-7B-Instruct-1M specific (1M token context)
model:
  name: "Qwen/Qwen2.5-7B-Instruct-1M"
  localModelPath: "/models/Qwen2.5-7B-Instruct-1M"
  maxModelLen: "131072"  # Start with 128K tokens, can be increased later
  quantization: ""  # No quantization for optimal quality with 1M context
  toolCallParser: ""
  ropeScaling: {}  # Model natively supports 1M tokens without RoPE scaling
  # Custom arguments optimized for long context processing
  customArgs:
    - "--max-num-batched-tokens=2048"  # Very conservative batching
    - "--max-num-seqs=1"  # Process one sequence at a time
    - "--disable-log-stats"  # Reduce logging overhead
    - "--enforce-eager"  # Disable CUDA graphs for compatibility
  # Environment variables optimized for long context
  env:
    VLLM_USE_MODELSCOPE: "False"
    PYTORCH_CUDA_ALLOC_CONF: "max_split_size_mb:512"
    VLLM_WORKER_MULTIPROC_METHOD: "spawn"

# Qwen2.5-7B-Instruct-1M specific resource requirements (optimized for 1M context)
resources:
  limits:
    cpu: '8'
    memory: 48Gi  # Maximum allowed by cluster resource limits
    nvidia.com/gpu: 1  # Single GPU to avoid tensor parallel issues
  requests:
    cpu: '4'
    memory: 24Gi
    nvidia.com/gpu: 1

# GPU configuration for single GPU setup
gpu:
  count: 1
  deviceIds: []

vllm:
  # vLLM settings optimized for long context
  gpuMemoryUtilization: "0.85"  # Can use more memory with single GPU
  tensorParallelSize: "1"  # Single GPU
  enableAutoToolChoice: false
  disableLogRequests: true  # Reduce logging overhead for long sequences

# Extended health probe timing for 1M context model (longer startup)
healthProbes:
  readinessProbe:
    enabled: true
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 300  # 5 minutes - longer for large model
    periodSeconds: 15
    timeoutSeconds: 10
    successThreshold: 1
    failureThreshold: 20
  livenessProbe:
    enabled: true
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 360  # 6 minutes
    periodSeconds: 30
    timeoutSeconds: 10
    successThreshold: 1
    failureThreshold: 10

# Environment variables optimized for 1M context processing
env:
  HOME: "/tmp"
  HF_HOME: "/models/.cache"
  TORCH_COMPILE_DISABLE: "1"
  NCCL_DEBUG: "INFO"
  NCCL_P2P_LEVEL: "LOC"
  NCCL_SOCKET_IFNAME: "^docker,lo"
  VLLM_RAY_START_UP_TIMEOUT_S: "1800"  # 30 minutes for large model
  VLLM_WORKER_USE_RAY: "0"
  VLLM_CONFIG_ROOT: "/models/.cache"
  VLLM_CACHE_ROOT: "/models/.cache"
  CUDA_LAUNCH_BLOCKING: "0"
  TOKENIZERS_PARALLELISM: "true"
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
  VLLM_WORKER_MULTIPROC_METHOD: "spawn"
  VLLM_ENGINE_ITERATION_TIMEOUT_S: "1200"  # 20 minutes for long sequences
  # Memory optimization for 1M context
  PYTORCH_CUDA_ALLOC_CONF: "max_split_size_mb:512"
  CUDA_VISIBLE_DEVICES: "0"

# Volume configuration for large model storage
volumes:
  dshm:
    enabled: true
    medium: Memory
    sizeLimit: "32Gi"  # Larger shared memory for long context
  modelCache:
    enabled: true
    storageClass: "aws-ebs"
    size: "200Gi"  # Larger storage for model and cache
    accessMode: "ReadWriteOnce"
    retainOnDelete: true
  flashinferCache:
    enabled: true

# Node affinity to ensure deployment on high-memory GPU nodes
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: nvidia.com/gpu.product
          operator: In
          values:
          - NVIDIA-A100-SXM4-40GB
          - NVIDIA-A100-SXM4-80GB
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
          - p4d.24xlarge  # AWS instance with 8x A100 40GB
          - p4de.24xlarge # AWS instance with 8x A100 80GB
          - g5.48xlarge   # Alternative high-memory GPU instance

# Additional tolerations for high-memory GPU nodes
tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule
  - key: tenant
    operator: Equal
    value: rh-jarvis-ai-a100
    effect: NoSchedule
  - key: tenant
    operator: Equal
    value: llmaas-a100
    effect: NoSchedule
  - key: tenant
    operator: Equal
    value: rh-jarvis-ai
    effect: NoSchedule
  - key: tenant
    operator: Equal
    value: llmaas
    effect: NoSchedule
  - key: high-memory-gpu
    operator: Equal
    value: "true"
    effect: NoSchedule
