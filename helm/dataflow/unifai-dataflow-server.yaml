env:
  MONGODB_IP: mongodb
  MONGODB_PORT: 27017
  RABBITMQ_IP: rabbitmq
  RABBITMQ_PORT: 5672
  qdrant_ip: "http://qdrant"
  qdrant_port: "6333"
  BACKEND_ENV: "production"
  ROLE: "flask"
debug: false

serviceAccount:
  create: false

# replicaCount: 1
image:
   repository: images.paas.redhat.com/genie/unifai/unifai-dataflow
   tag: latest
   pullPolicy: Always

service:
  type: ClusterIP
  port: 13456


volumes:
  - name: unifai-dataflow-shared-storage
    persistentVolumeClaim:
      claimName: unifai-dataflow-shared-storage

volumeMounts:
  - name: unifai-dataflow-shared-storage
    mountPath: /app/shared

livenessProbe:
  httpGet:
    path: /api/health/
    port: 13456
readinessProbe:
  httpGet:
    path: /api/health/
    port: 13456

resources:
  limits:
    cpu: 4
    memory: 12Gi
  requests:
    cpu: 4
    memory: 12Gi
