apiVersion: route.openshift.io/v1
kind: Route
metadata:
  annotations:
    openshift.io/host.generated: "true"
  labels:
    {{- include "dataflow.labels" . | nindent 4 }}
  name: {{ include "dataflow.fullname" . }}
spec:
  host: 
  port:
    targetPort: 13456
  to:
    kind: Service
    name: {{ include "dataflow.fullname" . }}
    weight: 100
  wildcardPolicy: None

