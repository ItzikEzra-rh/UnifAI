apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "genie-prompt-lab.fullname" . }}
  labels:
    {{- include "genie-prompt-lab.labels" . | nindent 4 }}
spec:
{{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
{{- end }}
  selector:
    matchLabels:
      {{- include "genie-prompt-lab.selectorLabels" . | nindent 6 }}
  template:
    metadata:
    {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
    {{- end }}
      labels:
        {{- include "genie-prompt-lab.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "genie-prompt-lab.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["{{ .Values.command}}"]
          env:
          - name: HF_TOKEN
            value: "{{ .Values.HF_TOKEN}}" 
          - name: RABBITMQ_IP
            value: "{{ .Values.RABBITMQ_IP}}" 
          - name: RABBITMQ_PORT
            value: "{{ .Values.RABBITMQ_PORT}}"
          - name: MONGODB_IP
            value: "{{ .Values.MONGODB_IP}}"
          - name: MONGODB_PORT
            value: "{{ .Values.MONGODB_PORT}}"
          - name: INPUT_JSON_PATH
            value: "{{ .Values.INPUT_JSON_PATH}}"
          - name: OUTPUT_DATA_DIR_PATH
            value: "{{ .Values.OUTPUT_DATA_DIR_PATH}}"
          - name: PROMPT_LAB_MODEL_HF_ID
            value: "{{ .Values.PROMPT_LAB_MODEL_HF_ID}}"
          - name: PROMPT_LAB_MAX_GENERATION_LENGTH
            value: "{{ .Values.PROMPT_LAB_MAX_GENERATION_LENGTH}}"
          - name: PROMPT_LAB_MAX_CONTEXT_LENGTH
            value: "{{ .Values.PROMPT_LAB_MAX_CONTEXT_LENGTH}}"
          - name: PROMPT_LAB_BATCH_SIZE
            value: "{{ .Values.PROMPT_LAB_BATCH_SIZE}}"
          - name: QUEUE_TARGET_SIZE
            value: "{{ .Values.QUEUE_TARGET_SIZE}}"


{{- if .Values.proxy}}
          - name: http_proxy
            value: "{{ .Values.proxy}}"
          - name: https_proxy
            value: "{{ .Values.proxy}}"
          - name: no_proxy
            #value: "localhost,127.0.0.1,redis-master,kibana-kibana,elasticsearch-master,lado-be"
            value: "localhost,127.0.0.1,kibana-kibana"
{{- end }}
          - name: HUGGING_FACE_HUB_TOKEN
            value: "{{ .Values.hf_token}}"

         #command: ["/usr/bin/sleep"]
         #          args: ["infinity"]
          
          ports:
            - name: http
              #containerPort: 80
              containerPort: 8080
              protocol: TCP
            #- name: http-socket
              #containerPort: 80
              #containerPort: 5001
              #protocol: TCP
              #livenessProbe:
              #httpGet:
              #path: /
              #port: http
              #readinessProbe:
              #httpGet:
              #path: /
              #port: http
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
