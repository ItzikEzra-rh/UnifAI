apiVersion: v1
kind: Service
metadata:
  name: {{ include "genie-be.fullname" . }}
  labels:
    {{- include "genie-be.labels" . | nindent 4 }}
spec:
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http

  selector:
    {{- include "genie-be.selectorLabels" . | nindent 4 }}
