apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "docling.fullname" . }}-test"
  labels:
    {{- include "docling.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
    - name: docling-api-test
      image: curlimages/curl:latest
      command: ['/bin/sh']
      args:
        - -c
        - |
          set -e
          echo "🚀 Starting Docling API Tests..."
          
          # Test 1: Health Check
          echo "1️⃣ Testing health endpoint..."
          curl -f -s "http://{{ include "docling.fullname" . }}:{{ .Values.service.port }}/health" || exit 1
          echo "✅ Health check passed"
          
          # Test 2: OpenAPI Spec
          echo "2️⃣ Testing OpenAPI specification..."
          curl -f -s "http://{{ include "docling.fullname" . }}:{{ .Values.service.port }}/openapi.json" > /dev/null || exit 1
          echo "✅ OpenAPI spec accessible"
          
          # Test 3: Documentation
          echo "3️⃣ Testing documentation endpoint..."
          curl -f -s "http://{{ include "docling.fullname" . }}:{{ .Values.service.port }}/docs" > /dev/null || exit 1
          echo "✅ Documentation accessible"
          
          # Test 4: Document Conversion with Performance Timing
          echo "4️⃣ Testing document conversion with performance timing..."
          
          start_time=$(date +%s)
          response=$(curl -s -w "%{http_code}" -o /tmp/response.json \
            -X 'POST' \
            "http://{{ include "docling.fullname" . }}:{{ .Values.service.port }}/v1/convert/source" \
            -H 'accept: application/json' \
            -H 'Content-Type: application/json' \
            -d '{
              "sources": [{"kind": "http", "url": "https://arxiv.org/pdf/2501.17887"}]
            }')
          end_time=$(date +%s)
          duration=$((end_time - start_time))
          
          echo "HTTP Response: $response | Duration: ${duration}s"
          
          if [ "$response" = "200" ]; then
            # Check if response contains expected fields without printing full output
            if grep -q '"status"' /tmp/response.json; then
              echo "✅ Document conversion successful (response contains status field)"
            else
              echo "⚠️ Document conversion returned 200 but unexpected response format"
            fi
          else
            echo "❌ Document conversion failed with HTTP $response"
            echo "Error details:" $(head -1 /tmp/response.json 2>/dev/null || echo "No error details")
            exit 1
          fi
          
          echo "🎉 All Docling API tests completed successfully!"
