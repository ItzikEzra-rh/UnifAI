# Default values for docling-serve.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 1

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  registry: "quay.io"
  repository: "docling-project/docling-serve"
  tag: "latest"
  pullPolicy: IfNotPresent

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []

# This is to override the chart name.
nameOverride: ""
fullnameOverride: "docling-serve"

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}

# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  type: ClusterIP
  port: 5001
  targetPort: 5001

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: docling-serve.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: docling-tls
  #    hosts:
  #      - docling.local

# This block is for setting up OpenShift routes for more information can be found here: https://docs.openshift.com/container-platform/4.11/networking/routes/route-configuration.html
route:
  enabled: true
  host: ""  # If empty, OpenShift will auto-generate a hostname
  path: ""  # Optional path for the route
  annotations: {}
  tls:
    termination: edge  # edge, passthrough, or reencrypt
    insecureEdgeTerminationPolicy: Redirect  # Allow, Disable, or Redirect
  wildcardPolicy: None

# Resource limits and requests
resources:
  requests:
    memory: "2Gi"
    cpu: "1"
  limits:
    memory: "4Gi"
    cpu: "2"

# Storage configuration for document processing
storage:
  volumeName: "unifai-docling-volume"
  requestedSize: 20Gi
  className: aws-ebs
  accessModes:
    - ReadWriteOnce
  annotations:
    kubernetes.io/reclaimPolicy: Delete
  labels:
    paas.redhat.com/appcode: TAG-001

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

# Node selection constraints
nodeSelector: {}

# Tolerations for pod assignment
tolerations: []

# Affinity settings
affinity: {}

# Network policy configuration for controlling pod traffic
networkPolicy:
  enabled: true
  annotations: {}
  # Ingress rules - allow incoming traffic to the service
  ingress:
    - ports:
        - port: 5001
          protocol: TCP
        - port: 8080
          protocol: TCP
  # Egress rules - allow outgoing traffic (empty means allow all)
  egress: []

# Environment variables for the docling-serve service
env:
  - name: DOCLING_SERVE_HOST
    value: "0.0.0.0"
  - name: DOCLING_SERVE_PORT
    value: "5001"
  - name: DOCLING_SERVE_ENABLE_UI
    value: "1"
  - name: DOCLING_SERVE_LOG_LEVEL
    value: "INFO"
  - name: DOCLING_SERVE_MAX_WORKERS
    value: "4"
  - name: DOCLING_SERVE_MAX_FILE_SIZE_MB
    value: "100"

# Configuration for docling-serve API
config:
  # Server configuration
  server:
    host: "0.0.0.0"
    port: 5001
    workers: 4
    enableUI: true
    logLevel: "INFO"
  
  # Document processing configuration
  processing:
    maxFileSizeMB: 100
    timeoutSeconds: 300
    enableOCR: true
    outputFormats:
      - "markdown"
      - "text"
      - "json"
  
  # API configuration
  api:
    version: "v1"
    corsEnabled: true
    maxRequestsPerMinute: 60
