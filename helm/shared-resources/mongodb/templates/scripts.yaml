apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mongodb.fullname" . }}-scripts
  labels:
    {{- include "mongodb.labels" . | nindent 4 }}
data:
  01-init-userdb.sh: |-
{{ .Files.Get "_scripts/01-init-userdb.sh" | indent 4 }}

  extra-init.sh: |-
{{ .Files.Get "_scripts/extra-init.sh" | indent 4 }}

  init.sh: |-
{{ .Files.Get "_scripts/init.sh" | indent 4 }}
