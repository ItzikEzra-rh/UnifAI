apiVersion: v1
kind: Service
metadata:
  name: {{ include "redis.fullname" . }}-svc
  labels:
    app: {{ .Chart.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      name: {{ .Values.service.name }}
  clusterIP: None
  selector:
    app: {{ .Chart.Name }}

