apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
spec:
  selector:
    matchLabels:
      app: redis  
  serviceName: redis
  replicas: 1
  template:
    metadata:
      labels:
        app: redis 
    spec:
      volumes:
        - name: redis-volume
          persistentVolumeClaim:
            claimName: redis-pvc
      containers:
        - name: redis
          image: registry.redhat.io/rhel9/redis-7:9.7
          #args: ["--requirepass", "admin", "--appendonly", "yes", "--save", "900", "1", "--save", "30", "2"]
          ports:
            - containerPort: 6379
              name: redis
          resources:
            limits:
              cpu: .50
              memory: 1500Mi
            requests:
              cpu: .25
              memory: 1024Mi
          env:
            - name: REDIS_PASSWORD
              value: "Mc10vin!!"
            - name: ALLOW_EMPTY_PASSWORD
              value: "no"
          volumeMounts:
            - name: redis-volume
              mountPath: /data