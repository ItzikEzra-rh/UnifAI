apiVersion: v1
kind: Service
metadata:
  name: {{ include "vllm-serving-engine.fullname" . }}
  labels:
    {{- include "vllm-serving-engine.labels" . | nindent 4 }}
  {{- if .Values.namespace }}
  namespace: {{ .Values.namespace }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "vllm-serving-engine.selectorLabels" . | nindent 4 }} 