apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vllm-serving-engine.fullname" . }}
  labels:
    {{- include "vllm-serving-engine.labels" . | nindent 4 }}
  namespace: {{ .Values.namespace | default .Release.Namespace }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "vllm-serving-engine.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "vllm-serving-engine.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      {{- /* Use the single model configuration */ -}}
      {{- $model := .Values.model -}}
      
      {{- if .Values.volumes.modelCache.enabled }}
      initContainers:
      - name: model-man
        image: alpine/git:latest
        command: ["/bin/sh", "-c"]
        args:
        - |
          echo "=== Basic Model Download ==="
          echo "Model: {{ $model.name }}"
          
          # Create cache directory if it doesn't exist
          mkdir -p /models/.cache
          
          # Check if git-lfs is available, if not try to install
          if ! command -v git-lfs >/dev/null 2>&1; then
            echo "Installing git-lfs..."
            apk add --no-cache git git-lfs 2>/dev/null || echo "Could not install git-lfs, using basic git"
          fi
          
          # Initialize git-lfs if available
          git lfs install --skip-repo 2>/dev/null || echo "Using basic git without LFS"
          
          MODEL_DIR="models--$(echo '{{ $model.name }}' | tr '/' '-')"
          
          {{- if $model.forceDownload }}
          # Force redownload - remove existing model
          echo "🗑️ Forcing model redownload (forceDownload=true) - removing existing cache..."
          rm -rf "/models/.cache/$MODEL_DIR"
          rm -f "{{ $model.localModelPath }}"
          {{- end }}
          
          # Check if model already exists
          if [ -d "/models/.cache/$MODEL_DIR" ] && [ -f "/models/.cache/$MODEL_DIR/config.json" ]; then
            echo "✅ Model already cached"
          else
            echo "📥 Downloading model..."
            cd /models/.cache || exit 1
            
            # Use git clone with recovery for checkout failures
            echo "Cloning https://huggingface.co/{{ $model.name }}"
            if ! git clone "https://huggingface.co/{{ $model.name }}" "$MODEL_DIR"; then
              echo "⚠️ Git clone failed, attempting recovery..."
              if [ -d "$MODEL_DIR" ]; then
                echo "🔧 Attempting git restore to recover working tree..."
                cd "$MODEL_DIR" && git restore --source=HEAD :/
                if [ $? -eq 0 ]; then
                  echo "✅ Git restore successful"
                  cd ..
                else
                  echo "❌ Git restore failed, cleaning up and retrying..."
                  cd .. && rm -rf "$MODEL_DIR"
                  echo "🔄 Retrying with git clone --depth 1..."
                  git clone --depth 1 "https://huggingface.co/{{ $model.name }}" "$MODEL_DIR" || {
                    echo "❌ All git clone attempts failed"
                    exit 1
                  }
                fi
              else
                echo "❌ Git clone completely failed"
                exit 1
              fi
            fi
          fi
          
          # Create symlink for vLLM to find the model at expected path
          echo "🔗 Creating symlink for vLLM..."
          mkdir -p /models/
          if [ ! -L "{{ $model.localModelPath }}" ] && [ -d "/models/.cache/$MODEL_DIR" ]; then
            ln -sf "/models/.cache/$MODEL_DIR" "{{ $model.localModelPath }}"
            echo "✅ Symlink created: {{ $model.localModelPath }} -> /models/.cache/$MODEL_DIR"
          fi
          
          echo "🎉 Model setup completed!"
        resources:
          requests:
            cpu: "1"
            memory: "2Gi"
          limits:
            cpu: "4"
            memory: "8Gi"
        volumeMounts:
        - name: model-cache
          mountPath: /models
        env:
        - name: HOME
          value: "/models"
        - name: HF_HOME
          value: "/models/.cache"
        - name: PYTHONUNBUFFERED
          value: "1"
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          
          {{- if .Values.vllm.debug }}
          command: ["/bin/sh"]
          args: ["-c", "echo 'Debug mode enabled - sleeping infinity for debugging' && sleep infinity"]
          {{- else }}
          args:
            - "--model"
            - "{{ $model.localModelPath }}"
            - "--max-model-len"
            - "{{ $model.maxModelLen }}"
            - "--gpu-memory-utilization"
            - "{{ .Values.vllm.gpuMemoryUtilization }}"
            {{- if $model.quantization }}
            - "--quantization"
            - "{{ $model.quantization }}"
            {{- end }}
            {{- if $model.ropeScaling }}
            - "--rope-scaling"
            - "{\"rope_type\":\"yarn\",\"factor\":4.0,\"original_max_position_embeddings\":32768}"  # hardcoded for qwen
            {{- end }}
            - "--tensor-parallel-size"
            - "{{ .Values.vllm.tensorParallelSize }}"
            - "--port"
            - "{{ .Values.service.targetPort }}"
            - "--host"
            - "0.0.0.0"
            - "--trust-remote-code"
            - "--disable-log-stats"
            {{- if .Values.vllm.disableLogRequests }}
            - "--disable-log-requests"
            {{- end }}
            {{- if .Values.vllm.enableAutoToolChoice }}
            - "--enable-auto-tool-choice"
            {{- end }}
            {{- if $model.toolCallParser }}
            - "--tool-call-parser"
            - "{{ $model.toolCallParser }}"
            {{- end }}
            {{- /* Add custom arguments specific to the model */ -}}
            {{- range $model.customArgs }}
            - "{{ . }}"
            {{- end }}
          {{- end }}
          
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          {{- if and .Values.healthProbes.readinessProbe.enabled (not .Values.vllm.debug) }}
          readinessProbe:
            httpGet:
              path: {{ .Values.healthProbes.readinessProbe.httpGet.path }}
              port: {{ .Values.healthProbes.readinessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.healthProbes.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthProbes.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.healthProbes.readinessProbe.timeoutSeconds }}
            successThreshold: {{ .Values.healthProbes.readinessProbe.successThreshold }}
            failureThreshold: {{ .Values.healthProbes.readinessProbe.failureThreshold }}
          {{- end }}
          {{- if and .Values.healthProbes.livenessProbe.enabled (not .Values.vllm.debug) }}
          livenessProbe:
            httpGet:
              path: {{ .Values.healthProbes.livenessProbe.httpGet.path }}
              port: {{ .Values.healthProbes.livenessProbe.httpGet.port }}
            initialDelaySeconds: {{ .Values.healthProbes.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.healthProbes.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.healthProbes.livenessProbe.timeoutSeconds }}
            successThreshold: {{ .Values.healthProbes.livenessProbe.successThreshold }}
            failureThreshold: {{ .Values.healthProbes.livenessProbe.failureThreshold }}
          {{- end }}
          env:
            {{- /* Base environment variables */ -}}
            {{- range $name, $value := .Values.env }}
            - name: {{ $name }}
              value: "{{ $value }}"
            {{- end }}
            
            {{- /* Model-specific environment variables */ -}}
            {{- range $name, $value := $model.env }}
            - name: {{ $name }}
              value: "{{ $value }}"
            {{- end }}

          resources:
            limits:
              cpu: {{ .Values.resources.limits.cpu }}
              memory: {{ .Values.resources.limits.memory }}
              nvidia.com/gpu: {{ index .Values.resources.limits "nvidia.com/gpu" }}
            requests:
              cpu: {{ .Values.resources.requests.cpu }}
              memory: {{ .Values.resources.requests.memory }}
              nvidia.com/gpu: {{ index .Values.resources.requests "nvidia.com/gpu" }}
          volumeMounts:
            {{- if .Values.volumes.dshm.enabled }}
            - name: dshm
              mountPath: /dev/shm
            {{- end }}
            {{- if .Values.volumes.modelCache.enabled }}
            - name: model-cache
              mountPath: /models
            {{- end }}
      volumes:
        {{- if .Values.volumes.dshm.enabled }}
        - name: dshm
          emptyDir:
            medium: {{ .Values.volumes.dshm.medium }}
            sizeLimit: "{{ .Values.volumes.dshm.sizeLimit }}"
        {{- end }}

        {{- if .Values.volumes.modelCache.enabled }}
        - name: model-cache
          persistentVolumeClaim:
            claimName: {{ include "vllm-serving-engine.fullname" . }}-model-cache
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }} 
