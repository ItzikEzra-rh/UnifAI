apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "vllm-serving-engine.fullname" . }}-benchmark"
  labels:
    {{- include "vllm-serving-engine.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "3"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
  - name: vllm-benchmark
    image: williamyeh/wrk:latest
    env:
    - name: MODEL_NAME
      value: "{{ .Values.model.localModelPath }}"
    - name: BASE_URL
      value: "http://{{ include "vllm-serving-engine.fullname" . }}-{{ .Values.namespace | default .Release.Namespace }}.apps.stc-ai-e1-prod.rtc9.p1.openshiftapps.com"
    command: ["/bin/sh"]
    args:
      - -c
      - |
        set -e
        
        echo "🚀 vLLM Comprehensive JSON API Benchmark Suite"
        echo "=============================================="
        echo "🎯 Target: $BASE_URL"
        echo "🤖 Model: $MODEL_NAME"
        echo "📅 Start time: $(date)"
        echo ""
        
        # Wait for service to be ready
        echo "⏳ Waiting for vLLM service to be ready..."
        for i in $(seq 1 30); do
          if wget -q -O /dev/null "$BASE_URL/health" 2>/dev/null; then
            echo "✅ Service is ready!"
            break
          fi
          echo "Waiting... ($i/30)"
          sleep 2
        done
        
        echo ""
        echo "🔥 PHASE 1: QUICK JSON API VALIDATION"
        echo "====================================="
        
        echo ""
        echo "🧪 Health Endpoint Test (10 seconds)"
        wrk -t1 -c2 -d10s --latency "$BASE_URL/health"
        
        echo ""
        echo "🧪 Models JSON API Test (8 seconds)"
        wrk -t1 -c2 -d8s --latency "$BASE_URL/v1/models"
        
        echo ""
        echo "🔥 PHASE 2: JSON COMPLETION TEST"
        echo "================================="
        
        echo "📝 Testing JSON completion..."
        echo "Request: {\"model\": \"$MODEL_NAME\", \"prompt\": \"Hello\", \"max_tokens\": 10}"
        
        # Test a single completion to verify it works
        RESPONSE=$(wget -q -O - --post-data="{\"model\": \"$MODEL_NAME\", \"prompt\": \"Hello\", \"max_tokens\": 10, \"temperature\": 0.1}" \
          --header="Content-Type: application/json" \
          --timeout=30 "$BASE_URL/v1/completions")
        
        if echo "$RESPONSE" | grep -q '"text"'; then
          echo "✅ JSON completion successful!"
          echo "Response sample: $(echo "$RESPONSE" | head -c 200)..."
        else
          echo "❌ JSON completion failed"
          echo "Response: $RESPONSE"
        fi
        
        echo ""
        echo "🎉 COMPREHENSIVE JSON API BENCHMARK COMPLETE!"
        echo "============================================="
        echo "📅 End time: $(date)"
        echo ""
        echo "📊 Test Summary:"
        echo "  ✅ Phase 1: Health and Models API testing completed"
        echo "  ✅ Phase 2: JSON completion validation completed"
        echo ""
        echo "🚀 vLLM $MODEL_NAME JSON API benchmarking complete!"
        
        # Keep running for log collection
        sleep 10 