apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "vllm-serving-engine.fullname" . }}-api-test"
  labels:
    {{- include "vllm-serving-engine.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  containers:
  - name: api-test
    image: alpine/curl:latest
    command: ["/bin/sh"]
    args:
      - -c
      - |
        set -e
        echo "🧪 Starting vLLM API Tests..."
        
        # Use internal service endpoint for reliable testing
        echo "📍 Using internal service endpoint for testing"
        BASE_URL="http://{{ include "vllm-serving-engine.fullname" . }}.{{ .Values.namespace | default .Release.Namespace }}.svc.cluster.local:{{ .Values.service.port }}"
        
        echo "🎯 Testing vLLM API at: $BASE_URL"
        
        # Test 1: Health Check
        echo "🏥 Test 1: Health Check"
        HEALTH_RESPONSE=$(curl -s -w "%{http_code}" "$BASE_URL/health")
        HTTP_CODE="${HEALTH_RESPONSE: -3}"
        if [ "$HTTP_CODE" = "200" ]; then
          echo "✅ Health check passed (HTTP $HTTP_CODE)"
        else
          echo "❌ Health check failed (HTTP $HTTP_CODE)"
          exit 1
        fi
        
        {{/* Use the single model configuration */}}
        {{- $model := .Values.model }}
        
        # Test 2: Models Endpoint
        echo "🤖 Test 2: Models Endpoint"
        MODELS_RESPONSE=$(curl -s "$BASE_URL/v1/models")
        if echo "$MODELS_RESPONSE" | grep -q "{{ $model.localModelPath }}"; then
          echo "✅ Models endpoint working - Found model: {{ $model.localModelPath }}"
        else
          echo "❌ Models endpoint failed - Model not found"
          echo "Response: $MODELS_RESPONSE"
          exit 1
        fi
        
        # Test 3: France Capital Completion Test
        echo "🇫🇷 Test 3: France Capital Completion"
        COMPLETION_RESPONSE=$(curl -s -X POST "$BASE_URL/v1/completions" \
          -H "Content-Type: application/json" \
          -d '{
            "model": "{{ $model.localModelPath }}",
            "prompt": "The capital of France is",
            "max_tokens": 10,
            "temperature": 0.1
          }')
        
        # Check if response contains expected elements
        if echo "$COMPLETION_RESPONSE" | grep -q '"text"' && echo "$COMPLETION_RESPONSE" | grep -q '"choices"' && echo "$COMPLETION_RESPONSE" | grep -q '"usage"'; then
          
          # Extract the generated text
          GENERATED_TEXT=$(echo "$COMPLETION_RESPONSE" | grep -o '"text":"[^"]*"' | cut -d'"' -f4)
          echo "✅ Completion test passed"
          echo "📝 Generated text: '$GENERATED_TEXT'"
          
          # Bonus check: Does it mention Paris?
          if echo "$GENERATED_TEXT" | grep -qi "paris"; then
            echo "🎯 Bonus: Response correctly mentions Paris!"
          fi
        else
          echo "❌ Completion test failed"
          echo "Response: $COMPLETION_RESPONSE"
          exit 1
        fi
        
        # Test 4: Token Usage Validation
        echo "📊 Test 4: Token Usage Validation"
        PROMPT_TOKENS=$(echo "$COMPLETION_RESPONSE" | grep -o '"prompt_tokens":[0-9]*' | cut -d':' -f2)
        COMPLETION_TOKENS=$(echo "$COMPLETION_RESPONSE" | grep -o '"completion_tokens":[0-9]*' | cut -d':' -f2)
        TOTAL_TOKENS=$(echo "$COMPLETION_RESPONSE" | grep -o '"total_tokens":[0-9]*' | cut -d':' -f2)
        
        if [ "$PROMPT_TOKENS" -gt 0 ] && [ "$COMPLETION_TOKENS" -gt 0 ] && [ "$TOTAL_TOKENS" -gt 0 ]; then
          echo "✅ Token usage validation passed"
          echo "📈 Tokens - Prompt: $PROMPT_TOKENS, Completion: $COMPLETION_TOKENS, Total: $TOTAL_TOKENS"
        else
          echo "❌ Token usage validation failed"
          exit 1
        fi
        
        # Test 5: Response Time Check
        echo "⏱️  Test 5: Response Time Check"
        START_TIME=$(date +%s)
        curl -s "$BASE_URL/health" > /dev/null
        END_TIME=$(date +%s)
        RESPONSE_TIME=$((END_TIME - START_TIME))
        
        if [ "$RESPONSE_TIME" -lt 10 ]; then
          echo "✅ Response time acceptable: ${RESPONSE_TIME}s"
        else
          echo "⚠️  Response time slow but acceptable: ${RESPONSE_TIME}s"
        fi
        
        echo ""
        echo "🎉 All vLLM API tests completed successfully!"
        echo "🔗 API accessible at: $BASE_URL"
        echo "📋 Test Summary:"
        echo "  - Health Check: ✅ PASS"
        echo "  - Models Endpoint: ✅ PASS" 
        echo "  - France Capital Test: ✅ PASS"
        echo "  - Token Usage: ✅ PASS"
        echo "  - Response Time: ✅ PASS"
        echo ""
        echo "🚀 vLLM {{ .Values.model.name }} is ready for production use!" 