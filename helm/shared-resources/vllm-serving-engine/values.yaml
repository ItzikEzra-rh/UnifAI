# General base values file for vLLM multi-model chart
# This file contains common parameters that apply to all models
# Model-specific values files should inherit from this base

# Basic deployment configuration
replicaCount: 1
image:
  repository: vllm/vllm-openai
  pullPolicy: IfNotPresent
  tag: "latest"
imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Pod configuration
podAnnotations: {}
podLabels:
  paas.redhat.com/appcode: "TAG-001"
podSecurityContext:
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
    add:
      - NET_BIND_SERVICE

# Service configuration
service:
  type: ClusterIP
  port: 80
  targetPort: 8000

# Ingress configuration
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# Route configuration for OpenShift
route:
  enabled: true
  host: ""
  clusterDomain: ""
  path: ""
  annotations:
    haproxy.router.openshift.io/timeout: "300s"
    haproxy.router.openshift.io/balance: "roundrobin"
  tls:
    enabled: false
    termination: edge
    insecureEdgeTerminationPolicy: Redirect



# Resource requirements (reduced for small model)
resources:
  limits:
    cpu: '4'
    memory: 16Gi
    nvidia.com/gpu: 1
  requests:
    cpu: '2'
    memory: 8Gi
    nvidia.com/gpu: 1

# HuggingFace secret configuration
huggingFaceSecret:
  name: "huggingface-token-secret"
  key: "token"

# Model configuration - supports multiple models
# Default: Small model for testing/development
models:
  # Small test model (default for development)
  test-model:
    enabled: true
    model: "microsoft/DialoGPT-small"
    localModelPath: "/models/DialoGPT-small"
    maxModelLen: "1024"
    quantization: "fp16"
    toolCallParser: ""
    ropeScaling: {}
    # Custom arguments for vllm serve command
    customArgs: []
    # Custom environment variables for this model
    env: {}
  
  # Qwen3-32B model (disabled by default)
  qwen3-32b:
    enabled: false
    model: "Qwen/Qwen3-32B-FP8"
    localModelPath: "/models/Qwen3-32B-FP8"
    maxModelLen: "80000"
    quantization: "fp8"
    toolCallParser: "hermes"
    ropeScaling:
      rope_type: "yarn"
      factor: 4.0
      original_max_position_embeddings: 32768
    customArgs: []
    env: {}
  
  # GPT-OSS-20B model (disabled by default)
  gpt-oss-20b:
    enabled: false
    model: "openai/gpt-oss-20b"
    localModelPath: "/models/gpt-oss-20b"
    maxModelLen: "32768"
      #quantization: "fp16"
    enableAutoToolChoice: false
    toolCallParser: ""
    ropeScaling: {}
    # Custom arguments for vllm serve command
    customArgs:
      - "--async-scheduling"
    env:
      VLLM_ATTENTION_BACKEND: "TRITON_ATTN_VLLM_V1"

# General vLLM configuration (applies to all models)
vllm:
  # General vLLM settings (no model-specific hardcoding)
  gpuMemoryUtilization: "0.90"
  tensorParallelSize: "1"
    #enableAutoToolChoice: true
  disableLogRequests: true
  forceDownload: false
  # Debug mode - when enabled, container sleeps instead of starting vLLM
  debug: false

# Container configuration
containerPort: 8000

# Health probes (general configuration for all models)
healthProbes:
  readinessProbe:
    enabled: true
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 180
    periodSeconds: 10
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 30
  livenessProbe:
    enabled: true
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 240
    periodSeconds: 20
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 15

# Environment variables (general configuration for all models)
env:
  HOME: "/tmp"
  HF_HOME: "/models/.cache"
  TORCH_COMPILE_DISABLE: "1"
  NCCL_DEBUG: "INFO"
  NCCL_P2P_LEVEL: "LOC"
  NCCL_SOCKET_IFNAME: "^docker,lo"
  VLLM_RAY_START_UP_TIMEOUT_S: "900"
  VLLM_WORKER_USE_RAY: "0"
  VLLM_CONFIG_ROOT: "/models/.cache"
  VLLM_CACHE_ROOT: "/models/.cache"
  CUDA_LAUNCH_BLOCKING: "0"
  TOKENIZERS_PARALLELISM: "true"
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
  VLLM_WORKER_MULTIPROC_METHOD: "spawn"
  VLLM_ENGINE_ITERATION_TIMEOUT_S: "600"

# Autoscaling configuration
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# Volumes configuration (general configuration for all models)
volumes:
  dshm:
    enabled: true
    medium: Memory
    sizeLimit: "16Gi"
  modelCache:
    enabled: true
    storageClass: "aws-ebs"
    size: "200Gi"
    accessMode: "ReadWriteOnce"
    retainOnDelete: true
  flashinferCache:
    enabled: true

# Node selection and scheduling
nodeSelector: {}
tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule
  - key: tenant
    operator: Equal
    value: rh-jarvis-ai-a100
    effect: NoSchedule
  - key: tenant
    operator: Equal
    value: llmaas-a100
    effect: NoSchedule
  - key: tenant
    operator: Equal
    value: rh-jarvis-ai
    effect: NoSchedule
  - key: tenant
    operator: Equal
    value: llmaas
    effect: NoSchedule
affinity: {}

# Labels
labels:
  paas.redhat.com/appcode: "TAG-001"

# Service account
serviceAccount:
  create: false
  name: ""
