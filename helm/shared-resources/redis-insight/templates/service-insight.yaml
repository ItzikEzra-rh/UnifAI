apiVersion: v1
kind: Service
metadata:
  name: {{ include "redis-insight.fullname" . }}
  labels:
    app: {{ .Chart.Name }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.port }}
      protocol: TCP
      #name: {{ .Values.service.port }}
  selector:
    app: {{ .Chart.Name }}
