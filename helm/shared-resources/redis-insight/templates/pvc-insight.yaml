apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-insight-pvc
  labels:
    app: redis-insight
    paas.redhat.com/appcode: TAG-001
  annotations:
  {{- with .Values.annotations }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.storage }}
  accessModes:
    {{- toYaml .accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .requestedSize }}
  {{- if .className }}
  storageClassName: {{ .className }}
  {{- end }}
  {{- end }}