apiVersion: v1
kind: Service
metadata:
  name: {{ include "temporal.fullname" . }}-svc
  labels:
    app: {{ .Chart.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      name: temporal
    - port: {{ .Values.service.port_ui }}
      name: temporal-ui
  clusterIP: None
  selector:
    app: {{ .Chart.Name }}

