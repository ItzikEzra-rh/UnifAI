# Redis Insight deployment with name 'redisinsight'
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal #deployment name
  labels:
    app: temporal #deployment label
spec:
  replicas: 1 #a single replica pod
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: temporal #which pods is the deployment managing, as defined by the pod template
  template: #pod template
    metadata:
      labels:
        app: temporal #label for pod/s
    spec:
      volumes:
        - name: temporal
          persistentVolumeClaim:
            claimName: temporal-pvc
      # initContainers:
      #   - name: init
      #     image: busybox
      #     command:
      #       - /bin/sh
      #       - '-c'
      #       - |
      #         chown -R 1000 /data
      #     resources: {}
      #     volumeMounts:
      #       - name: redis-insight
      #         mountPath: /data
      #     terminationMessagePath: /dev/termination-log
      #     terminationMessagePolicy: File
      containers:
        - name:  temporal #Container name (DNS_LABEL, unique)
          image: temporalio/temporal #repo/image
          imagePullPolicy: IfNotPresent #Always pull image
          tty: true
          stdin: true
          command: ["/bin/sh", "-c", "temporal server start-dev --ip 0.0.0.0"]
          volumeMounts:
          - name: temporal #Pod volumes to mount into the container's filesystem. Cannot be updated.
            mountPath: /tmp/temporal
          ports:
          - containerPort: 7233 #exposed container port and protocol
            protocol: TCP
          - containerPort: 8233 #exposed container port and protocol
            protocol: TCP