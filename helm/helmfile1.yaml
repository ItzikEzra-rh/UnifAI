#podman run -dt   --name helmfile   --user $(id -u):$(id -g)   --workdir /helm/charts   -v "$PWD":/helm/charts:Z   -v "$HOME/.kube":/helm/.kube:Z   ghcr.io/helmfile/helmfile:latest bash
@@

helmDefaults:
    createNamespace: false
    wait: false

releases:
  - name: unifai-mongodb
    chart: ./mongodb
    wait: true
    timeout: 300
    values:
      - "./mongodb.yaml"

  - name: unifai-qdrant
    chart: ./qdrant
    wait: true
    timeout: 300
    values:
      - "./qdrant.yaml"
      
  - name: unifai-rabbitmq
    chart: ./rabbitmq
    wait: true
    values:
      - "./rabbitmq.yaml"

