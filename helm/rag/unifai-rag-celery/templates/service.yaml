{{- if .Values.service.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "unifai-rag-celery.fullname" . }}
  labels:
    {{- include "unifai-rag-celery.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "unifai-rag-celery.selectorLabels" . | nindent 4 }}
{{- end }}