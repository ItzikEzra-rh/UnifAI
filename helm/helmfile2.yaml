#podman run -dt --workdir /helm/charts/helm -v .:/helm/charts -v ~/.kube/:/helm/.kube --name helmfile ghcr.io/helmfile/helmfile:latest bash

helmDefaults:
    createNamespace: false
    wait: false

releases:

  - name: genie-ui
    chart: ./genie-ui
    version: "0.9.0"
    wait: true
    values:
      - "./genie-ui.values.yaml"
    needs:
      - genie-be

  - name: genie-be
    chart: ./genie-be
    wait: true
      #set:
      #- name: env.MONGO_EXT_ADDR
      #  value: '{{ exec "sh" (list "-c" "kubectl get svc mongodb -o jsonpath={.status.loadBalancer.ingress[0].hostname} || echo mongodb") }}'
    hooks:
      - events: ["presync"]
        showlogs: true
        command: bash
        args:
          - "-c"
          - |
              LB_ADDR=$(kubectl get svc mongodb -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
              kubectl delete configmap mongodb-lb-config
              kubectl create configmap mongodb-lb-config --from-literal=MONGO_EXT_ADDR="$LB_ADDR" --dry-run=client -o yaml | kubectl apply -f -
    values:
      - "genie-be.values.yaml"


  - name: genie-llm-be
    chart: ./genie-llm-be
    wait: true
    values:
      - "genie-llm-be.values.yaml"
