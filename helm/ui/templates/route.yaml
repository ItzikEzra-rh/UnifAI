apiVersion: route.openshift.io/v1
kind: Route
metadata:
  annotations:
    openshift.io/host.generated: "true"
  labels:
    {{- include "ui.labels" . | nindent 4 }}
  name: {{ include "ui.fullname" . }}
spec:
  host: {{ .Values.route.host }}
  port:
    targetPort: 8080
  to:
    kind: Service
    name: {{ include "ui.fullname" . }}
    weight: 100
  wildcardPolicy: None

