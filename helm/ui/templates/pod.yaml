apiVersion: v1
kind: Pod
metadata:
  name: {{ include "ui.fullname" . }}
  labels:
    {{- include "ui.labels" . | nindent 4 }}
    {{- with .Values.podLabels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.podAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.imagePullSecrets }}
  imagePullSecrets:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.podSecurityContext }}
  securityContext:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  containers:
    - name: {{ .Chart.Name }}
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
      imagePullPolicy: {{ .Values.image.pullPolicy }}
      {{- if .Values.command }}
      command: {{ .Values.command | toYaml | nindent 8 }}
      {{- end }}
      ports:
      {{- range .Values.service.portList }}
        - name: http-{{ .name }}
          containerPort: {{ .port }}
          protocol: TCP
      {{- end }}
      env:
      {{- range $key, $value := .Values.env }}
          - name: "{{ $key }}"
            value: "{{ $value }}"
      {{- end }}
      {{- with .Values.resources }}
      resources:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      
      # {{- with .Values.livenessProbe }}
      # livenessProbe:
      #   {{- toYaml . | nindent 12 }}
      # {{- end }}
      # {{- with .Values.readinessProbe }}
      # readinessProbe:
      #   {{- toYaml . | nindent 12 }}
      # {{- end }}