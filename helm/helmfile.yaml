#podman run -dt --workdir /helm/charts -v .:/helm/charts -v ~/.kube/:/helm/.kube --name helmfile ghcr.io/helmfile/helmfile:latest bash

helmDefaults:
    createNamespace: false
    wait: false
  
releases:
  - name: genie-mongodb
    namespace: tag-ai--gzhou-nb
    chart: ./mongodb
    wait: true
    values:
      - "./mongodb.values.yaml"

  - name: genie-ui
    namespace: tag-ai--gzhou-nb
    chart: ./genie-ui
    version: "0.9.0"
    wait: true
    values:
      - "./genie-ui.values.yaml"
    needs:
      - genie-be

  - name: genie-be
    namespace: tag-ai--gzhou-nb
    chart: ./genie-be
    wait: true
    values:
      - "genie-be.values.yaml"
    needs:
      - genie-mongodb

  - name: genie-llm-be
    namespace: tag-ai--gzhou-nb
    chart: ./genie-llm-be
    wait: true
    values:
      - "genie-llm-be.values.yaml"
    needs:
      - genie-mongodb
