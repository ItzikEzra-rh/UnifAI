apiVersion: v1
kind: Service
metadata:
  name: {{ include "genie-llm-be.fullname" . }}
  labels:
    {{- include "genie-llm-be.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      name: http

  selector:
    {{- include "genie-llm-be.selectorLabels" . | nindent 4 }}
