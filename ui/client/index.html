<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>UnifAI</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23a855f7' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpath d='M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z'/%3e%3cpolyline points='3.29,7 12,12 20.71,7'/%3e%3cline x1='12' y1='22' x2='12' y2='12'/%3e%3c/svg%3e" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">   
    <script>
      // Fetch Umami analytics config from backend and inject script dynamically
      (async function() {
        try {
          const response = await fetch('/api1/settings/get.umami.settings', {
            credentials: 'include' // Include cookies for authentication
          });
          const config = await response.json();
          
          if (config.website_id && config.umami_url) {
            const script = document.createElement('script');
            script.async = true;
            script.defer = true;
            script.setAttribute('data-website-id', config.website_id);
            script.src = `${config.umami_url}/script.js`;
            document.head.appendChild(script);
          }
        } catch (error) {
          console.warn('Failed to load analytics config:', error);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
